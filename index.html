<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" id="manifest-link">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22%3E%3Crect width=%2232%22 height=%2232%22 rx=%226%22 fill=%22%230f0f0f%22/%3E%3Cpath d=%22M12 9l14 7-14 7V9z%22 fill=%22%235b8cde%22/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 192 192%22%3E%3Crect width=%22192%22 height=%22192%22 rx=%2224%22 fill=%22%230f0f0f%22/%3E%3Cpath d=%22M70 53l82 43-82 43V53z%22 fill=%22%235b8cde%22/%3E%3C/svg%3E">
<title>Local Player</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #0f0f0f;
  --surface:   #1a1a1a;
  --surface2:  #242424;
  --border:    #2e2e2e;
  --text:      #e8e8e8;
  --muted:     #888;
  --accent:    #e8a020;
  --accent2:   #c47010;
  --danger:    #e85040;
  --lv-hl:     #5b8cde;
  --lv-hl2:   #3a6abf;
  --radius:    10px;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; overscroll-behavior: none; }

/* ── Header ── */
.app-header {
  background: linear-gradient(135deg, #1a2a4a 0%, #0d1a30 100%);
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.app-header h1 { font-size: 20px; font-weight: 900; color: var(--lv-hl); letter-spacing: .04em; }
.app-header p  { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-top: 2px; }

/* ── Controls ── */
.controls {
  display: flex; gap: 8px; align-items: center;
  padding: 10px 12px; background: var(--surface); border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.btn {
  padding: 10px 18px; border: none; border-radius: var(--radius);
  font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: .04em;
  transition: opacity .15s; min-height: 44px; touch-action: manipulation;
}
.btn:active { opacity: .7; }
.btn-pick   { background: var(--lv-hl); color: #fff; }
.btn-sort   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-on     { background: var(--accent2); color: #fff; border: 1px solid var(--accent); }
.search-box {
  flex: 1; min-width: 120px;
  padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-size: 14px; min-height: 44px;
}
.search-box::placeholder { color: var(--muted); }
.count-badge {
  font-size: 11px; color: var(--muted); white-space: nowrap;
  padding: 0 4px;
}

/* ── File Grid ── */
.file-list {
  overflow-y: auto; max-height: calc(100vh - 180px);
}
.file-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; cursor: pointer; transition: background .15s;
  border-bottom: 1px solid rgba(255,255,255,.06); touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  min-height: 56px;
}
.file-item:active { background: rgba(255,255,255,.08); }
.file-item .play-icon {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--lv-hl); color: #fff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 16px;
}
.file-item .play-icon.audio { background: #b87c2e; }
.file-item-info { flex: 1; min-width: 0; }
.file-item-name {
  font-size: 15px; font-weight: 600; line-height: 1.3; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.file-item-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── Empty / Error states ── */
.state-msg {
  text-align: center; padding: 60px 24px; color: var(--muted);
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.state-msg .icon { font-size: 48px; }
.state-msg h2 { font-size: 18px; color: var(--text); font-weight: 700; }
.state-msg p  { font-size: 13px; line-height: 1.5; }

/* ── Player Overlay ── */
#player-overlay {
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: #000; flex-direction: column;
}
#player-overlay.active { display: flex; }
.player-topbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; background: rgba(0,0,0,.85);
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  padding-top: env(safe-area-inset-top, 8px);
  padding-left: env(safe-area-inset-left, 12px);
  padding-right: env(safe-area-inset-right, 12px);
}
.btn-close {
  padding: 10px 16px; background: var(--danger); color: #fff;
  border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer;
  white-space: nowrap; min-height: 44px; touch-action: manipulation;
}
.player-ttl {
  flex: 1; font-size: 14px; font-weight: 700; color: #fff;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.btn-nav {
  padding: 10px 12px; background: var(--surface2); color: #fff;
  border: none; border-radius: 6px; font-size: 18px; cursor: pointer;
  min-height: 44px; min-width: 44px; touch-action: manipulation;
  display: flex; align-items: center; justify-content: center;
}
#local-video {
  width: 100%; flex: 1; min-height: 0; object-fit: contain; background: #000;
}

/* ── SponsorBlock timeline ── */
#sb-timeline-wrap {
  position: relative; width: 100%; height: 8px;
  background: rgba(255,255,255,.12); cursor: pointer;
  touch-action: none; flex-shrink: 0;
}
#sb-timeline-wrap:active { height: 12px; }
.sb-progress {
  position: absolute; top: 0; left: 0; height: 100%;
  background: var(--lv-hl); pointer-events: none; z-index: 1;
  transition: width .1s linear;
}
.sb-seg {
  position: absolute; top: 0; height: 100%;
  background: var(--accent); opacity: .75; pointer-events: none; z-index: 2;
}

/* ── SponsorBlock bar ── */
#sb-bar {
  display: none; flex-shrink: 0;
  padding: 5px 10px; background: rgba(0,0,0,.85);
  font-size: 11px; color: var(--accent); text-align: center; z-index: 10;
  gap: 6px; align-items: center; justify-content: center; flex-wrap: wrap;
}
#sb-bar.visible { display: flex; }
#sb-bar .sb-stat { color: var(--muted); font-size: 10px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── PWA Install badge ── */
#pwa-badge {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 99999; background: var(--lv-hl); color: #fff; font-weight: 700;
  font-size: 14px; padding: 12px 24px; border-radius: 24px; cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4); display: none;
  text-transform: uppercase; letter-spacing: .06em;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
</style>
</head>
<body>

<div class="app-header">
  <h1>📱 Local Player</h1>
  <p>Videos & Songs · Phone Storage · No Network</p>
</div>

<div class="controls">
  <button class="btn btn-pick" onclick="LV.pickFolder()">📂 Open Folder</button>
  <input class="search-box" type="search" placeholder="🔍 Search…" oninput="LV.search(this.value)" id="lv-search">
  <button class="btn btn-sort" onclick="LV.playAll()" id="lv-playall-btn">▶ Play All</button>
  <button class="btn btn-sort" onclick="LV.toggleSort()" id="lv-sort-btn">⇅ Name</button>
  <button class="btn btn-sort" onclick="LV.toggleShuffle()" id="lv-shuffle-btn">🔀 Off</button>
  <span class="count-badge" id="lv-count"></span>
</div>

<div id="lv-grid" class="file-list">
  <div class="state-msg">
    <div class="icon">📂</div>
    <h2>No folder open</h2>
    <p>Tap <strong>Open Folder</strong> to pick your video folder from phone storage.<br>Plays entirely offline — no network needed.</p>
  </div>
</div>

<!-- Player Overlay -->
<div id="player-overlay">
  <div class="player-topbar">
    <button class="btn-close" onclick="LV.close()">✕ Close</button>
    <span class="player-ttl" id="lv-player-title">Loading…</span>
    <button class="btn-nav" onclick="LV.prevTrack()" id="lv-prev-btn">⏮</button>
    <button class="btn-nav" onclick="LV.playNext()" id="lv-next-btn">⏭</button>
  </div>
  <video id="local-video" playsinline controls preload="metadata"></video>
  <div id="sb-timeline-wrap"><div class="sb-progress" id="sb-progress"></div></div>
  <div id="sb-bar"></div>
</div>

<div id="pwa-badge" onclick="LV.installPWA()">⬇ Install App</div>

<script>
/* =====================================================================
   LOCAL PLAYER — Standalone app
   Sandbox: completely self-contained, zero shared code.
   Player: <video>/<audio> element, no iframe, no CORS, no network for playback.
   SponsorBlock: placeholder #sb-bar ready for integration.
   ===================================================================== */
var LV = (function() {

  /* ── Config ── */
  var CONFIG = {
    dbName: 'LocalVideosDB',
    storeName: 'session',
    version: 1
  };

  /* ── State ── */
  var _files      = [];
  var _filtered   = [];
  var _sortMode   = 'name';  // 'name' | 'date' | 'size'
  var _currentIdx = null;
  var _rootName   = '';
  var _shuffleMode = false;
  var _playedIndices = [];
  var _saveTimer  = null;

  /* ── DOM refs ── */
  var grid      = document.getElementById('lv-grid');
  var overlay   = document.getElementById('player-overlay');
  var videoEl   = document.getElementById('local-video');
  var titleEl   = document.getElementById('lv-player-title');
  var countEl   = document.getElementById('lv-count');
  var sortBtn   = document.getElementById('lv-sort-btn');
  var shuffleBtn = document.getElementById('lv-shuffle-btn');
  var sbBar     = document.getElementById('sb-bar');
  var sbTimeline = document.getElementById('sb-timeline-wrap');
  var sbProgress = document.getElementById('sb-progress');

  /* ── Supported video formats ── */
  var MEDIA_EXTS = /\.(mp4|mkv|webm|mov|avi|m4v|3gp|ts|flv|wmv|mp3|wav|flac|aac|ogg|m4a|opus|wma)$/i;
  var AUDIO_EXTS = /\.(mp3|wav|flac|aac|ogg|m4a|opus|wma)$/i;

  /* ── Format file size ── */
  function fmtSize(bytes) {
    if (!bytes) return '';
    if (bytes > 1e9) return (bytes/1e9).toFixed(1) + ' GB';
    if (bytes > 1e6) return (bytes/1e6).toFixed(1) + ' MB';
    return (bytes/1e3).toFixed(0) + ' KB';
  }

  /* ── Audio detection ── */
  function isAudio(name) { return AUDIO_EXTS.test(name); }

  /* ── Format duration ── */
  function fmtDuration(secs) {
    if (!secs || isNaN(secs)) return '';
    var h = Math.floor(secs/3600);
    var m = Math.floor((secs%3600)/60);
    var s = Math.floor(secs%60);
    if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    return m + ':' + String(s).padStart(2,'0');
  }

  /* ── IndexedDB persistence ── */
  function openDB() {
    return new Promise(function(resolve, reject) {
      var req = indexedDB.open(CONFIG.dbName, CONFIG.version);
      req.onupgradeneeded = function() {
        var db = req.result;
        if (!db.objectStoreNames.contains(CONFIG.storeName))
          db.createObjectStore(CONFIG.storeName);
      };
      req.onsuccess = function() { resolve(req.result); };
      req.onerror = function() { reject(req.error); };
    });
  }

  function storeHandle(handle) {
    openDB().then(function(db) {
      var tx = db.transaction(CONFIG.storeName, 'readwrite');
      tx.objectStore(CONFIG.storeName).put(handle, 'dirHandle');
      return tx.done;
    }).catch(function(){});
  }

  function loadHandle() {
    return openDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction(CONFIG.storeName, 'readonly');
        var req = tx.objectStore(CONFIG.storeName).get('dirHandle');
        req.onsuccess = function() { resolve(req.result || null); };
        req.onerror = function() { reject(null); };
      });
    }).catch(function() { return null; });
  }

  function storeRootName(name) {
    try { localStorage.setItem('lv_rootName', name); } catch(e) {}
  }

  function loadRootName() {
    try { return localStorage.getItem('lv_rootName') || ''; } catch(e) { return ''; }
  }

  function updateHeader() {
    var h = document.querySelector('.app-header h1');
    if (h) h.textContent = _rootName ? '📁 ' + _rootName : '📱 Local Player';
  }

  /* ── Playback persistence ── */
  function saveState() {
    try {
      if (_currentIdx !== null) localStorage.setItem('lv_idx', _currentIdx);
      if (videoEl.duration && isFinite(videoEl.duration))
        localStorage.setItem('lv_time', videoEl.currentTime);
    } catch(e) {}
  }

  function loadState() {
    try {
      var idx = localStorage.getItem('lv_idx');
      var time = localStorage.getItem('lv_time');
      return { idx: idx !== null ? parseInt(idx, 10) : null, time: time !== null ? parseFloat(time) : 0 };
    } catch(e) { return { idx: null, time: 0 }; }
  }

  /* ── Shuffle ── */
  function toggleShuffle() {
    _shuffleMode = !_shuffleMode;
    _playedIndices = [];
    shuffleBtn.textContent = _shuffleMode ? '🔀 On' : '🔀 Off';
    shuffleBtn.className = 'btn ' + (_shuffleMode ? 'btn-on' : 'btn-sort');
  }

  function prevTrack() {
    if (!_filtered.length) return;
    if (_currentIdx === null) return play(_filtered[_filtered.length - 1].idx);
    var curPos = -1;
    _filtered.forEach(function(f, i) { if (f.idx === _currentIdx) curPos = i; });
    if (curPos === -1) return play(_filtered[_filtered.length - 1].idx);
    var prev = (curPos - 1 + _filtered.length) % _filtered.length;
    play(_filtered[prev].idx);
  }

  function playAll() {
    if (!_filtered.length) return;
    var idx = _filtered[0].idx;
    _shuffleMode = false;
    _playedIndices = [];
    shuffleBtn.textContent = '🔀 Off';
    shuffleBtn.className = 'btn btn-sort';
    play(idx);
  }

  function nextShuffleIdx() {
    if (!_filtered.length) return null;
    if (_playedIndices.length >= _filtered.length) _playedIndices = [];
    var available = [];
    _filtered.forEach(function(f, i) {
      if (_playedIndices.indexOf(f.idx) === -1) available.push(f.idx);
    });
    if (!available.length) return null;
    var pick = available[Math.floor(Math.random() * available.length)];
    _playedIndices.push(pick);
    return pick;
  }

  function nextSequentialIdx() {
    if (!_filtered.length) return null;
    if (_currentIdx === null) return _filtered[0].idx;
    var curPos = -1;
    _filtered.forEach(function(f, i) { if (f.idx === _currentIdx) curPos = i; });
    if (curPos === -1) return _filtered[0].idx;
    var next = (curPos + 1) % _filtered.length;
    return _filtered[next].idx;
  }

  function playNext() {
    var idx = _shuffleMode ? nextShuffleIdx() : nextSequentialIdx();
    if (idx === null || idx === _currentIdx) return;
    play(idx);
  }

  /* ── Pick folder ── */
  function pickFolder() {
    /* file:// protocol kills showDirectoryPicker (needs HTTPS).
       Try it only on secure contexts; fall back to webkitdirectory,
       then plain <input multiple> as last resort for mobile. */
    if (window.showDirectoryPicker && location.protocol !== 'file:' && location.protocol !== 'content:') {
      window.showDirectoryPicker({ mode: 'read' })
        .then(function(dirHandle) {
          storeHandle(dirHandle);
          _rootName = dirHandle.name;
          storeRootName(_rootName);
          updateHeader();
          return scanDir(dirHandle);
        })
        .then(function(files) { loadFiles(files); })
        .catch(function(e) {
          if (e.name !== 'AbortError') webkitFallback();
        });
    } else if (document.createElement('input').webkitdirectory !== undefined) {
      webkitFallback();
    } else {
      simpleFilePicker();
    }
  }

  function webkitFallback() {
    var inp = document.createElement('input');
    inp.type = 'file';
    inp.multiple = true;
    inp.accept = 'video/*,audio/*';
    inp.setAttribute('webkitdirectory', '');
    inp.onchange = function() {
      var files = Array.from(inp.files)
        .filter(function(f) { return MEDIA_EXTS.test(f.name); })
        .map(function(f) {
          return { file: f, name: f.name, ext: f.name.split('.').pop().toUpperCase(),
                   size: f.size, url: URL.createObjectURL(f) };
        });
      loadFiles(files);
    };
    inp.click();
  }

  function simpleFilePicker() {
    var inp = document.createElement('input');
    inp.type = 'file';
    inp.multiple = true;
    inp.accept = 'video/*,audio/*';
    inp.onchange = function() {
      var files = Array.from(inp.files)
        .filter(function(f) { return MEDIA_EXTS.test(f.name); })
        .map(function(f) {
          return { file: f, name: f.name, ext: f.name.split('.').pop().toUpperCase(),
                   size: f.size, url: URL.createObjectURL(f) };
        });
      loadFiles(files);
    };
    inp.click();
  }

  async function scanDir(dirHandle, prefix) {
    var results = [];
    prefix = prefix || '';
    for await (var entry of dirHandle.values()) {
      if (entry.kind === 'file' && MEDIA_EXTS.test(entry.name)) {
        var file = await entry.getFile();
        results.push({
          file: file, name: entry.name,
          displayName: prefix ? prefix + '/' + entry.name : entry.name,
          ext: entry.name.split('.').pop().toUpperCase(),
          size: file.size, url: URL.createObjectURL(file)
        });
      } else if (entry.kind === 'directory') {
        var sub = await scanDir(entry, prefix ? prefix + '/' + entry.name : entry.name);
        results = results.concat(sub);
      }
    }
    return results;
  }

  /* ── Load files into state ── */
  function loadFiles(files) {
    _files = files;
    _files.forEach(function(f, i) { f.idx = i; });
    sortFiles();
    renderGrid(_filtered);
  }

  /* ── Sort ── */
  function sortFiles() {
    _filtered = _files.slice();
    var q = (document.getElementById('lv-search') || {}).value || '';
    if (q) {
      var ql = q.toLowerCase();
      _filtered = _filtered.filter(function(f) { return f.name.toLowerCase().includes(ql); });
    }
    if (_sortMode === 'name') {
      _filtered.sort(function(a,b) { return a.name.localeCompare(b.name); });
    } else if (_sortMode === 'size') {
      _filtered.sort(function(a,b) { return b.size - a.size; });
    } else if (_sortMode === 'date') {
      _filtered.sort(function(a,b) { return (b.file.lastModified||0) - (a.file.lastModified||0); });
    }
  }

  function toggleSort() {
    var modes = ['name','size','date'];
    var labels = { name: '⇅ Name', size: '⇅ Size', date: '⇅ Date' };
    var idx = modes.indexOf(_sortMode);
    _sortMode = modes[(idx+1) % modes.length];
    sortBtn.textContent = labels[_sortMode];
    sortFiles();
    renderGrid(_filtered);
  }

  function search(q) {
    sortFiles();
    renderGrid(_filtered);
  }

  /* ── Render list ── */
  function renderGrid(files) {
    var allAudio = files.length && files.every(function(f) { return isAudio(f.name); });
    var label = allAudio ? 'song' : 'media';
    countEl.textContent = files.length + ' ' + label + (files.length !== 1 ? 's' : '');
    if (files.length === 0) {
      grid.innerHTML = _files.length === 0
        ? '<div class="state-msg"><div class="icon">📂</div><h2>No folder open</h2><p>Tap <strong>Open Folder</strong> to load your media.</p></div>'
        : '<div class="state-msg"><div class="icon">🔍</div><h2>No results</h2><p>No media match your search.</p></div>';
      return;
    }
    grid.innerHTML = '';
    files.forEach(function(f) {
      var item = document.createElement('div');
      item.className = 'file-item';
      item.dataset.idx = f.idx;

      var nameNoExt = f.name.replace(/\.[^.]+$/, '');
      var meta = f.ext + (f.size ? ' · ' + fmtSize(f.size) : '');
      var isAud = isAudio(f.name);

      item.innerHTML =
        '<span class="play-icon' + (isAud ? ' audio' : '') + '">' + (isAud ? '🎵' : '▶') + '</span>' +
        '<div class="file-item-info">' +
          '<div class="file-item-name">' + esc(nameNoExt) + '</div>' +
          '<div class="file-item-meta">' + esc(meta) + '</div>' +
        '</div>';

      item.addEventListener('click', function() { play(f.idx); });
      grid.appendChild(item);
    });
  }

  /* ── Play ── */
  function play(idx) {
    var f = _files[idx];
    if (!f) return;
    _currentIdx = idx;
    saveState();

    titleEl.textContent = f.name.replace(/\.[^.]+$/, '');
    videoEl.src = f.url;
    videoEl.load();

    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';

    onVideoOpen(f, function() {
      if (_sbSegments.length && videoEl.duration && isFinite(videoEl.duration)) {
        seekPastSponsor();
      }
      videoEl.play().catch(function(){});
    });
  }

  /* ── Play at idx with optional resume time ── */
  function playAt(idx, resumeTime) {
    if (!_files[idx]) return;
    _currentIdx = idx;
    var f = _files[idx];
    titleEl.textContent = f.name.replace(/\.[^.]+$/, '');
    videoEl.src = f.url;
    videoEl.load();

    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';

    onVideoOpen(f, function() {
      if (_sbSegments.length && videoEl.duration && isFinite(videoEl.duration)) {
        seekPastSponsor();
      }
      if (resumeTime > 0 && videoEl.duration && isFinite(videoEl.duration) && resumeTime < videoEl.duration) {
        videoEl.currentTime = resumeTime;
      }
      videoEl.play().catch(function(){});
    });
  }

  /* ── Close player ── */
  function close() {
    saveState();
    videoEl.pause();
    videoEl.src = '';
    overlay.classList.remove('active');
    document.body.style.overflow = '';
    onVideoClose();
  }

  /* ── SponsorBlock ── */
  var _sbSegments = [];
  var _sbAutoSkip = true;  // always ON, forced
  var _sbSkipped  = 0;
  var _sbCheckInterval = null;
  var SB_API = 'https://sponsor.ajay.app/api/skipSegments?videoID=';

  function extractVideoId(name) {
    // Strip extension for cleaner matching
    var base = name.replace(/\.[^.]+$/, '');
    // Pattern 1: ID inside brackets, parens, or braces
    var m = name.match(/[\[\(\{]([a-zA-Z0-9_-]{11})[\]\)\}]/);
    if (m) return m[1];
    // Pattern 2: ID separated by dash, underscore, space, or at boundaries
    m = name.match(/(?:^|[\s\-_\.])([a-zA-Z0-9_-]{11})(?:[\s\-_\.]|$)/);
    if (m) return m[1];
    // Pattern 3: bare ID as whole filename (before extension)
    m = base.match(/^([a-zA-Z0-9_-]{11})$/);
    if (m) return m[1];
    // Pattern 4: word-boundary fallback for embedded IDs
    m = name.match(/\b([a-zA-Z0-9_-]{11})\b/);
    return m ? m[1] : null;
  }

  function fetchSBSegments(videoId) {
    return fetch(SB_API + encodeURIComponent(videoId))
      .then(function(r) {
        if (r.status === 404) return []; // no segments = empty result, not error
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        var cats = ['sponsor', 'selfpromo'];
        return data.filter(function(s) { return cats.indexOf(s.category) !== -1; });
      })
      .catch(function(e) { return { error: e.message }; });
  }

  function renderSBSegments(duration) {
    var existing = sbTimeline.querySelectorAll('.sb-seg');
    for (var i = existing.length - 1; i >= 0; i--) existing[i].remove();
    if (!_sbSegments.length || !duration || !isFinite(duration) || duration <= 0) return;
    _sbSegments.forEach(function(s) {
      var start = s.segment[0];
      var end   = s.segment[1];
      if (end > duration) end = duration;
      if (start >= duration) return;
      var el = document.createElement('div');
      el.className = 'sb-seg';
      el.style.left = (start / duration * 100) + '%';
      el.style.width = ((end - start) / duration * 100) + '%';
      el.title = s.category + ' (' + fmtDuration(start) + ' - ' + fmtDuration(end) + ')';
      sbTimeline.appendChild(el);
    });
  }

  function updateSBProgress() {
    if (!videoEl.duration || !isFinite(videoEl.duration)) return;
    var pct = (videoEl.currentTime / videoEl.duration * 100);
    sbProgress.style.width = Math.min(pct, 100) + '%';
  }

  function seekPastSponsor() {
    if (!_sbSegments.length || !videoEl.duration || !isFinite(videoEl.duration)) return;
    var ct = videoEl.currentTime;
    var jumped = false;
    _sbSegments.forEach(function(s) {
      var start = s.segment[0];
      var end   = s.segment[1];
      if (ct >= start && ct < end) {
        videoEl.currentTime = end;
        _sbSkipped++;
        jumped = true;
      }
    });
    if (jumped) updateSBBar();
    return jumped;
  }

  function checkSBAutoSkip() {
    if (!_sbSegments.length) return;
    if (videoEl.duration && isFinite(videoEl.duration) && videoEl.duration > 0) {
      var rendered = sbTimeline.querySelectorAll('.sb-seg').length;
      if (!rendered) renderSBSegments(videoEl.duration);
    }
    if (!_sbAutoSkip || !videoEl.duration || !isFinite(videoEl.duration)) return;
    seekPastSponsor();
  }

  function seekTimeline(e) {
    if (!videoEl.duration || !isFinite(videoEl.duration)) return;
    var rect = sbTimeline.getBoundingClientRect();
    var x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
    var pct = Math.max(0, Math.min(1, x / rect.width));
    videoEl.currentTime = pct * videoEl.duration;
  }

  function updateSBBar() {
    if (!_sbSegments.length) {
      sbBar.innerHTML = '⚡ No sponsor segments';
      return;
    }
    var stat = _sbSkipped
      ? '⏭ Auto-skipped ' + _sbSkipped + ' sponsor' + (_sbSkipped > 1 ? 's' : '')
      : '⚡ ' + _sbSegments.length + ' sponsor segment' + (_sbSegments.length > 1 ? 's' : '');
    sbBar.innerHTML = stat + ' <span class="sb-stat">(forced ON)</span>';
  }

  function onVideoOpen(f, onReady) {
    _sbSegments = [];
    _sbSkipped = 0;
    sbProgress.style.width = '0%';
    renderSBSegments(videoEl.duration);
    sbBar.innerHTML = '⚡ Checking SponsorBlock…';
    sbBar.classList.add('visible');

    var vid = extractVideoId(f.name);
    if (!vid) {
      sbBar.innerHTML = '⚡ No video ID found in filename';
      if (onReady) onReady();
      return;
    }

    fetchSBSegments(vid).then(function(result) {
      if (result.error) {
        sbBar.innerHTML = '⚡ SB error: ' + result.error;
        if (onReady) onReady();
        return;
      }
      _sbSegments = result;
      if (!result.length) {
        sbBar.innerHTML = '⚡ No sponsor segments for this video';
        renderSBSegments(videoEl.duration);
        if (onReady) onReady();
        return;
      }
      renderSBSegments(videoEl.duration);
      updateSBBar();
      if (onReady) onReady();
    });

    if (_sbCheckInterval) clearInterval(_sbCheckInterval);
    _sbCheckInterval = setInterval(checkSBAutoSkip, 500);
  }

  function onVideoClose() {
    _sbSegments = [];
    _sbSkipped = 0;
    sbProgress.style.width = '0%';
    renderSBSegments(0);
    sbBar.classList.remove('visible');
    if (_sbCheckInterval) { clearInterval(_sbCheckInterval); _sbCheckInterval = null; }
  }

  /* ── Timeline seek events ── */
  sbTimeline.addEventListener('click', seekTimeline);
  sbTimeline.addEventListener('touchstart', function(e) { seekTimeline(e); }, { passive: true });

  /* ── Utils ── */
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Keyboard ── */
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && overlay.classList.contains('active')) close();
  });

  /* ── Restore previous session ── */
  (function initRestore() {
    _rootName = loadRootName();
    updateHeader();
    loadHandle().then(function(handle) {
      if (!handle) return;
      handle.queryPermission({ mode: 'read' }).then(function(status) {
        if (status !== 'granted') return;
        _rootName = handle.name;
        storeRootName(_rootName);
        updateHeader();
        scanDir(handle).then(function(files) {
          loadFiles(files);
          var state = loadState();
          if (state.idx !== null && state.idx < _files.length) {
            setTimeout(function() { playAt(state.idx, state.time); }, 300);
          }
        });
      });
    });
  })();

  /* ── PWA: Manifest + Install + Service Worker ── */
  var _pwaDeferredPrompt = null;

  // Generate manifest as Blob URL (reliable for install prompts)
  (function initManifest() {
    var icon512 = '%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 512 512%22%3E%3Crect width=%22512%22 height=%22512%22 rx=%2260%22 fill=%22%230f0f0f%22/%3E%3Cpath d=%22M186 140l220 116-220 116V140z%22 fill=%22%235b8cde%22/%3E%3C/svg%3E';
    var icon192 = '%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 192 192%22%3E%3Crect width=%22192%22 height=%22192%22 rx=%2224%22 fill=%22%230f0f0f%22/%3E%3Cpath d=%22M70 53l82 43-82 43V53z%22 fill=%22%235b8cde%22/%3E%3C/svg%3E';
    var manifest = {
      name: 'Local Player by 37md',
      short_name: 'LocalPlayer',
      description: 'Offline local media player with SponsorBlock',
      start_url: '.',
      display: 'standalone',
      background_color: '#0f0f0f',
      theme_color: '#0f0f0f',
      categories: ['entertainment','video','music'],
      icons: [
        { src: 'data:image/svg+xml,' + icon512, sizes: '512x512', type: 'image/svg+xml', purpose: 'any' },
        { src: 'data:image/svg+xml,' + icon192, sizes: '192x192', type: 'image/svg+xml', purpose: 'any' }
      ]
    };
    var link = document.getElementById('manifest-link');
    if (link) link.href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/json' }));
  })();

  var badgeEl = document.getElementById('pwa-badge');

  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    _pwaDeferredPrompt = e;
    if (badgeEl) badgeEl.style.display = 'block';
  });

  function installPWA() {
    if (!_pwaDeferredPrompt) return;
    _pwaDeferredPrompt.prompt();
    _pwaDeferredPrompt.userChoice.then(function() {
      _pwaDeferredPrompt = null;
      if (badgeEl) badgeEl.style.display = 'none';
    });
  }

  window.addEventListener('appinstalled', function() {
    _pwaDeferredPrompt = null;
    if (badgeEl) badgeEl.style.display = 'none';
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }

  /* ── Video events ── */
  videoEl.addEventListener('timeupdate', function() {
    updateSBProgress();
    // Periodic state save (every 5s)
    if (_currentIdx !== null) {
      if (_saveTimer) clearTimeout(_saveTimer);
      _saveTimer = setTimeout(saveState, 5000);
    }
  });
  videoEl.addEventListener('pause', saveState);
  videoEl.addEventListener('ended', function() {
    saveState();
    playNext();
  });
  videoEl.addEventListener('loadedmetadata', function() {
    renderSBSegments(videoEl.duration);
  });
  videoEl.addEventListener('durationchange', function() {
    renderSBSegments(videoEl.duration);
  });

  /* ── Public API ── */
  return { pickFolder: pickFolder, search: search, toggleSort: toggleSort, close: close,
           toggleShuffle: toggleShuffle,
           playNext: playNext, prevTrack: prevTrack, playAll: playAll, installPWA: installPWA };

})();
</script>
</body>
