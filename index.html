<style>
@media(prefers-reduced-motion){*{animation:none!important;transition:none!important}}
:root{--bg:#dec09a;--surface:#b8925f;--card:#d4b896;--accent:#1a1a1a;--series-hl:#2c4a2e;--videos-hl:#1a2e4a;--wl-hl:#6b2d00;--api-hl:#4a1a6b;--retro-hl:#7B1E2E;--local-hl:#1a4a3a;--text:#0d0d0d;--muted:#4a3828;--border:#9e7a52;--light:#e8d5b8;--lighter:#f0e6d0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);background-image:repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(0,0,0,0.016) 3px,rgba(0,0,0,0.016) 4px),repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.016) 3px,rgba(0,0,0,0.016) 4px);color:var(--text);min-height:100vh;overflow-x:hidden}
.app-header{background:var(--surface);border-bottom:3px solid var(--accent);position:sticky;top:0;z-index:100;box-shadow:0 3px 14px rgba(0,0,0,0.22)}
.header-top{display:flex;align-items:center;padding:13px 16px 9px;gap:12px}
.play-icon{width:36px;height:36px;flex-shrink:0}
.app-title-wrap{flex:1}
.app-title{font-family:'DM Serif Display',serif;font-size:38px;letter-spacing:.5px;color:var(--text);line-height:1}
.app-subtitle{font-size:14px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:3px}
.tab-bar{display:flex;border-top:1px solid rgba(0,0,0,0.18)}
.tab-btn{flex:1;padding:10px 4px;background:transparent;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;position:relative;transition:color .2s,background .2s;line-height:1.5;text-align:center}
.tab-btn.active{background:rgba(0,0,0,0.07)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:10%;width:80%;height:3px;border-radius:2px 2px 0 0}
.tab-btn.tab-series.active{color:var(--series-hl)}
.tab-btn.tab-series.active::after{background:var(--series-hl)}
.tab-btn.tab-videos.active{color:var(--videos-hl)}
.tab-btn.tab-videos.active::after{background:var(--videos-hl)}
.tab-btn.tab-watchlater.active{color:var(--wl-hl)}
.tab-btn.tab-watchlater.active::after{background:var(--wl-hl)}
.tab-icon{font-size:22px;display:block;margin-bottom:2px}
.wl-count{display:inline-block;background:var(--wl-hl);color:#fff;font-size:12px;min-width:20px;height:20px;line-height:20px;border-radius:10px;padding:0 6px;vertical-align:middle;margin-left:3px}
.app-body{max-width:960px;margin:0 auto;padding-bottom:80px}
.tab-panel{display:none}
.tab-panel.active{display:block}
.section-banner{padding:14px 16px 10px;border-bottom:2px solid rgba(0,0,0,0.14);display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.07)}
.banner-title{font-family:'DM Serif Display',serif;font-size:32px;letter-spacing:.3px}
.banner-title.s{color:var(--series-hl)}
.banner-title.v{color:var(--videos-hl)}
.banner-title.w{color:var(--wl-hl)}
.banner-sub{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
.banner-count{margin-left:auto;font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.channel-group{border-bottom:1px solid rgba(0,0,0,0.11)}
.ch-header{display:flex;align-items:center;padding:11px 16px;cursor:pointer;user-select:none;gap:10px;transition:background .15s}
.ch-header:hover{background:rgba(0,0,0,0.06)}
.ch-badge{font-size:12px;font-weight:900;text-transform:uppercase;padding:3px 8px;border-radius:2px;letter-spacing:.1em;flex-shrink:0}
.badge-s{background:rgba(44,74,46,.12);color:var(--series-hl);border:1px solid var(--series-hl)}
.badge-v{background:rgba(26,46,74,.12);color:var(--videos-hl);border:1px solid var(--videos-hl)}
.badge-mr{background:rgba(0,0,0,.07);color:var(--text);border:1px solid var(--border)}
.badge-retro{background:rgba(123,30,46,.1);color:var(--retro-hl);border:1px solid var(--retro-hl)}
.ch-name{font-size:20px;flex:1;color:var(--text)}
.ch-lang{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.ch-arrow{color:var(--muted);font-size:15px;transition:transform .25s}
.channel-group.open .ch-arrow{transform:rotate(180deg)}
.feed-grid{display:none;padding:0 10px 10px;flex-direction:column;background:rgba(0,0,0,0.04)}
.channel-group.open .feed-grid{display:flex}
.feed-item{padding:10px 6px;border-bottom:1px solid rgba(0,0,0,0.07);display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:background .15s;border-radius:3px}
.feed-item:last-of-type{border-bottom:none}
.feed-item:hover{background:rgba(0,0,0,0.05)}
.item-thumb{width:150px;height:84px;object-fit:cover;flex-shrink:0;border-radius:3px;border:1px solid rgba(0,0,0,0.18);background:var(--card)}
.item-info{flex:1;min-width:0}
.item-title{font-size:18px;line-height:1.45;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-date{font-size:14px;color:var(--muted);margin-top:4px;letter-spacing:.07em;text-transform:uppercase}
.item-actions{display:flex;flex-direction:column;gap:5px;align-items:center;flex-shrink:0}
.btn-play{width:36px;height:36px;background:var(--accent);color:#fff;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:transform .15s,opacity .15s}
.btn-play:hover{transform:scale(1.1);opacity:.85}
.btn-wl{width:36px;height:36px;background:var(--lighter);color:var(--wl-hl);border:1px solid var(--wl-hl);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:background .15s}
.btn-wl:hover{background:#ffe0c8}
.btn-wl.saved{background:var(--wl-hl);color:#fff}
.loading-row{padding:18px 16px;text-align:center;font-size:15px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.spin{display:inline-block;animation:spin .8s linear infinite;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-row{padding:12px 16px;font-size:15px;color:#7a2020;text-align:center;letter-spacing:.08em}
.series-tool{margin:14px 12px;border:2px solid var(--accent);border-radius:3px;overflow:hidden;background:rgba(0,0,0,0.04)}
.series-tool-hdr{background:var(--accent);padding:9px 14px;font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:.13em;color:#fff}
.series-tool-body{padding:12px}
.stool-input{width:100%;padding:9px 11px;background:var(--lighter);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:18px;border-radius:3px;margin-bottom:9px;outline:none;transition:border-color .2s}
.stool-input:focus{border-color:var(--accent)}
.stool-input::placeholder{color:var(--muted)}
.stool-btn{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:17px;font-weight:900;text-transform:uppercase;letter-spacing:.11em;cursor:pointer}
.stool-btn:hover{opacity:.87}
.series-results{margin-top:12px;border-top:1px solid var(--border);padding-top:12px}
.wl-empty{text-align:center;padding:50px 20px;font-size:20px;color:var(--muted)}
.wl-empty-icon{font-size:60px;display:block;margin-bottom:12px}
.wl-item{padding:12px 14px;border-bottom:1px solid rgba(0,0,0,0.1);display:flex;align-items:flex-start;gap:10px}
.wl-item:hover{background:rgba(0,0,0,0.04)}
.wl-thumb{width:144px;height:81px;object-fit:cover;flex-shrink:0;border-radius:3px;border:1px solid rgba(0,0,0,0.18);background:var(--card)}
.wl-info{flex:1;min-width:0}
.wl-title{font-size:18px;line-height:1.45;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.wl-meta{font-size:14px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.06em}
.wl-actions{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.btn-wl-play{width:36px;height:36px;background:var(--accent);color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.btn-wl-play:hover{opacity:.85}
.btn-wl-remove{width:36px;height:36px;background:var(--lighter);color:#7a2020;border:1px solid #7a2020;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.btn-wl-remove:hover{background:#ffe0d0}
.wl-clear-row{padding:12px 14px;border-top:2px solid rgba(0,0,0,0.12);text-align:right}
.btn-clear-all{background:none;border:2px solid #7a2020;color:#7a2020;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;padding:6px 14px;cursor:pointer;border-radius:3px}
.btn-clear-all:hover{background:#ffe0d0}
.load-more-wrap{text-align:center;padding:14px}
.btn-load-more{background:var(--lighter);border:2px solid var(--accent);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;padding:8px 20px;cursor:pointer;border-radius:3px;transition:background .2s}
.btn-load-more:hover{background:var(--card)}
#player-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:500;display:none;flex-direction:column}
#player-overlay.active{display:flex}





.player-topbar{display:flex;align-items:center;padding:11px 14px;background:var(--surface);border-bottom:3px solid var(--accent);gap:10px;flex-shrink:0}
.btn-close{background:var(--accent);border:none;color:#fff;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:17px;font-weight:900;cursor:pointer;border-radius:3px;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.player-ttl{font-size:17px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.btn-wl-player{background:var(--lighter);border:2px solid var(--wl-hl);color:var(--wl-hl);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:900;padding:6px 10px;cursor:pointer;border-radius:3px;flex-shrink:0;text-transform:uppercase;letter-spacing:.08em;transition:background .15s;white-space:nowrap}
.btn-wl-player:hover{background:#ffe0c8}
.btn-wl-player.saved{background:var(--wl-hl);color:#fff;border-color:var(--wl-hl)}
.btn-yt-open{background:var(--lighter);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:6px 10px;cursor:pointer;border-radius:3px;text-decoration:none;display:inline-flex;align-items:center;gap:3px;flex-shrink:0;text-transform:uppercase;letter-spacing:.07em}
.player-wrap{position:relative;width:100%;padding-bottom:56.25%;background:#000;flex-shrink:0}
.player-iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.player-info{padding:14px 16px;overflow-y:auto;flex:1;background:var(--surface)}
.player-info-title{font-family:'DM Serif Display',serif;font-size:27px;line-height:1.35;color:var(--text);margin-bottom:6px}
.player-info-meta{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.11em}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
#pwa-badge{position:fixed;bottom:20px;left:16px;z-index:1300;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:900;padding:9px 18px;border-radius:20px;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,0.3);display:none;letter-spacing:.1em;text-transform:uppercase}
.thumb-placeholder{width:150px;height:84px;flex-shrink:0;border-radius:3px;border:1px solid rgba(0,0,0,0.18);background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:27px}

/* Retro Songs tab */
.tab-btn.tab-retro.active{color:var(--retro-hl)}
.tab-btn.tab-retro.active::after{background:var(--retro-hl)}
.banner-title.r{color:var(--retro-hl)}
/* Retro Songs panel styles */
.retro-filter-bar{display:flex;flex-wrap:wrap;gap:7px;padding:12px 14px;background:rgba(123,30,46,0.06);border-bottom:1px solid rgba(123,30,46,0.15)}
.retro-filter-btn{padding:5px 14px;border-radius:14px;border:1.5px solid rgba(123,30,46,0.3);background:var(--lighter);color:var(--retro-hl);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:900;cursor:pointer;transition:all .18s;letter-spacing:.05em;text-transform:uppercase}
.retro-filter-btn:hover,.retro-filter-btn.active{background:var(--retro-hl);color:#f0e6d0;border-color:var(--retro-hl)}
.retro-section{border-bottom:1px solid rgba(0,0,0,0.1)}
.retro-sec-hdr{display:flex;align-items:center;gap:10px;padding:11px 16px;background:rgba(123,30,46,0.05);border-bottom:1px solid rgba(123,30,46,0.12)}
.retro-sec-icon{font-size:22px;flex-shrink:0}
.retro-sec-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--retro-hl);line-height:1.1}
.retro-sec-sub{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.retro-cards{display:flex;flex-direction:column;gap:0}
.retro-card{display:flex;align-items:stretch;text-decoration:none;color:inherit;border-bottom:1px solid rgba(0,0,0,0.07);transition:background .15s;position:relative;overflow:hidden}
.retro-card:hover{background:rgba(123,30,46,0.05)}
.retro-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--retro-hl);opacity:0;transition:opacity .18s}
.retro-card:hover::before{opacity:1}
.retro-card-accent{width:5px;flex-shrink:0}
.retro-card-body{flex:1;padding:12px 14px;min-width:0}
.retro-card-name{font-size:18px;color:var(--text);line-height:1.2;margin-bottom:3px}
.retro-card-desc{font-size:13px;color:var(--muted);line-height:1.4;margin-bottom:6px}
.retro-tag-row{display:flex;flex-wrap:wrap;gap:4px}
.retro-tag{font-size:10px;padding:2px 7px;border-radius:2px;font-weight:900;letter-spacing:.06em;text-transform:uppercase}
.rtag-official{background:rgba(44,74,46,.12);color:var(--series-hl);border:1px solid var(--series-hl)}
.rtag-topic{background:rgba(74,26,107,.1);color:var(--api-hl);border:1px solid var(--api-hl)}
.rtag-classic{background:rgba(26,46,74,.1);color:var(--videos-hl);border:1px solid var(--videos-hl)}
.rtag-curated{background:rgba(123,30,46,.1);color:var(--retro-hl);border:1px solid var(--retro-hl)}
.retro-card-arrow{display:flex;align-items:center;padding:0 14px 0 8px;color:rgba(123,30,46,0.3);font-size:16px;transition:color .15s;flex-shrink:0}
.retro-card:hover .retro-card-arrow{color:var(--retro-hl)}
.retro-hidden{display:none!important}
/* Local Videos tab */
.tab-btn.tab-local.active{color:var(--local-hl)}
.tab-btn.tab-local.active::after{background:var(--local-hl)}
.banner-title.lv{color:var(--local-hl)}
.local-folder-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px 20px;text-align:center;border:2px dashed var(--border);border-radius:12px;margin:20px;background:rgba(26,74,58,0.04);cursor:pointer;transition:background .2s}
.local-folder-zone:hover{background:rgba(26,74,58,0.09)}
.local-folder-icon{font-size:48px;line-height:1}
.local-folder-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--local-hl)}
.local-folder-sub{font-size:13px;color:var(--muted);line-height:1.5;max-width:280px}
.local-folder-btn{padding:10px 24px;background:var(--local-hl);color:#f0ffe8;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:900;cursor:pointer;letter-spacing:.06em;text-transform:uppercase}
.local-session-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(26,74,58,0.07);border-bottom:1px solid rgba(26,74,58,0.15);flex-wrap:wrap}
.local-session-info{flex:1;min-width:0;font-size:13px;color:var(--local-hl);font-weight:700}
.local-session-count{font-size:12px;color:var(--muted);font-weight:400}
.local-change-btn{padding:5px 12px;background:var(--lighter);border:1.5px solid var(--local-hl);color:var(--local-hl);border-radius:4px;font-size:12px;font-weight:900;cursor:pointer;letter-spacing:.05em;text-transform:uppercase;font-family:'DM Sans',sans-serif}
.local-search-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid rgba(0,0,0,0.08)}
.local-search-input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--lighter);color:var(--text)}
.local-search-input:focus{outline:none;border-color:var(--local-hl)}
.local-sort-btn{padding:6px 12px;background:var(--lighter);border:1.5px solid var(--border);border-radius:4px;font-size:12px;font-weight:900;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.local-grid{display:flex;flex-direction:column}
.local-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid rgba(0,0,0,0.07);cursor:pointer;transition:background .15s;position:relative}
.local-item:hover{background:rgba(26,74,58,0.06)}
.local-item:active{background:rgba(26,74,58,0.12)}
.local-thumb{width:72px;height:52px;object-fit:cover;border-radius:5px;background:#222;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:22px;overflow:hidden}
.local-thumb video{width:100%;height:100%;object-fit:cover}
.local-item-info{flex:1;min-width:0}
.local-item-name{font-size:15px;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.local-item-meta{font-size:12px;color:var(--muted);letter-spacing:.05em}
.local-item-sb{font-size:10px;font-weight:900;padding:2px 7px;border-radius:10px;background:rgba(26,74,58,.1);color:var(--local-hl);border:1px solid var(--local-hl);white-space:nowrap}
.local-item-sb.sb-found{background:var(--local-hl);color:#f0ffe8}
.local-item-sb.sb-none{background:rgba(0,0,0,.06);color:var(--muted);border-color:var(--border)}
.local-play-btn{width:36px;height:36px;border-radius:50%;background:var(--local-hl);border:none;color:#f0ffe8;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s}
.local-item:hover .local-play-btn{transform:scale(1.1)}
.local-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:15px}
/* Local video player (reuses player-overlay, adds video element) */
#local-video{position:absolute;inset:0;width:100%;height:100%;background:#000;display:none}
#local-video.lv-active{display:block}
.lv-sb-bar{display:flex;align-items:center;gap:8px;padding:7px 14px;background:rgba(26,74,58,0.08);border-top:1px solid rgba(26,74,58,0.15);flex-shrink:0;flex-wrap:wrap}

.lv-skip-info{font-size:11px;color:var(--muted)}
#sb-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(20,20,20,0.92);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:700;letter-spacing:.05em;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#sb-toast.show{opacity:1}

#sb-status.active{background:var(--retro-hl);color:#f0e6d0;border-color:var(--retro-hl)}
#sb-status.checking{opacity:.6}
/* API tab */
.tab-btn.tab-apisettings.active{color:var(--api-hl)}
.tab-btn.tab-apisettings.active::after{background:var(--api-hl)}
.banner-title.a{color:var(--api-hl)}
/* API settings panel */
.api-settings-box{margin:14px 12px;border:2px solid var(--api-hl);border-radius:3px;overflow:hidden}
.api-settings-hdr{background:var(--api-hl);padding:9px 14px;font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:.13em;color:#fff}
.api-settings-body{padding:14px}
.api-label{display:block;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.09em;color:var(--api-hl);margin-bottom:5px}
.api-input{width:100%;padding:9px 11px;background:var(--lighter);border:1px solid var(--border);color:var(--text);font-family:monospace;font-size:14px;border-radius:3px;margin-bottom:10px;outline:none}
.api-input:focus{border-color:var(--api-hl)}
.api-save-btn{width:100%;padding:10px;background:var(--api-hl);color:#fff;border:none;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:17px;font-weight:900;text-transform:uppercase;letter-spacing:.11em;cursor:pointer}
.api-save-btn:hover{opacity:.86}
.api-status{font-size:13px;margin-top:8px;padding:7px 10px;border-radius:3px;display:none}
.api-status.ok{background:rgba(44,74,46,.14);color:var(--series-hl);display:block}
.api-status.err{background:rgba(122,32,32,.12);color:#7a2020;display:block}
.api-model-info{font-size:12px;color:var(--muted);margin-top:12px;padding-top:10px;border-top:1px solid var(--border);line-height:1.6}
.api-model-info b{color:var(--text)}
#api-model-status{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;padding:3px 10px;border-radius:2px;margin-left:8px;display:inline-block}
#api-model-status.ok{background:rgba(46,204,113,.18);color:#1a6b3a;border:1px solid #2ecc71}
#api-model-status.warn{background:rgba(230,126,34,.15);color:#7a4200;border:1px solid #e67e22}
#api-model-status.err{background:rgba(231,76,60,.15);color:#7a1a1a;border:1px solid #e74c3c}
/* AI Analyse button */
.btn-ai-analyze{background:var(--videos-hl);color:#f0e6d0;border:none;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;padding:4px 8px;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.btn-ai-analyze:hover{opacity:.8}
.btn-ai-analyze.loading{background:var(--muted);cursor:wait}
.btn-ai-analyze.done{background:linear-gradient(135deg,#1a4a2e,#2d7a4a)}
/* AI analysis panel */
.ai-panel{display:none;margin:0 6px 10px;border:2px solid var(--videos-hl);border-radius:4px;overflow:hidden;background:var(--lighter)}
.ai-panel.open{display:block}
.ai-panel-hdr{background:var(--videos-hl);color:#f0e6d0;padding:8px 12px;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;justify-content:space-between}
.ai-panel-body{padding:12px;font-size:14px;line-height:1.6;color:var(--text)}
.ai-panel-body strong{display:block;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--videos-hl);margin:10px 0 4px}
.ai-panel-body strong:first-child{margin-top:0}
.ai-panel-body p{margin:0 0 4px}
.ai-tag{display:inline-block;background:rgba(26,46,74,.12);color:var(--videos-hl);border:1px solid var(--videos-hl);border-radius:2px;padding:1px 7px;font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin:2px 3px 2px 0}
.ai-panel-close{background:none;border:none;color:#f0e6d0;font-size:16px;cursor:pointer;padding:0 2px;line-height:1}
/* Thunder floating chat */
#thunder-btn{position:fixed;bottom:24px;right:16px;z-index:8000;width:54px;height:54px;border-radius:50%;background:var(--accent);border:3px solid var(--lighter);color:var(--lighter);font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;transition:transform .2s}
#thunder-btn:hover{transform:scale(1.12)}
#thunder-overlay{position:fixed;bottom:88px;right:16px;z-index:8002;width:370px;max-width:calc(100vw - 24px);background:var(--lighter);border:2px solid var(--accent);border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,0.35);display:none;flex-direction:column;overflow:hidden;max-height:500px}
.thunder-hdr{background:var(--accent);color:var(--lighter);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.thunder-hdr-title{font-weight:900;font-size:15px}
.thunder-close-btn{background:none;border:none;color:var(--lighter);font-size:18px;cursor:pointer;line-height:1}
.thunder-ctx-label{font-size:10px;color:var(--muted);padding:3px 9px;background:rgba(0,0,0,0.04);border-bottom:1px solid var(--border);flex-shrink:0;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
#thunder-messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px;min-height:180px;max-height:300px;background:#fafaf8}
.tmsg{display:flex;margin-bottom:2px}
.tmsg.user{justify-content:flex-end}
.tbubble{padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.5;max-width:86%}
.tbubble.ai{background:#f3f4f0;border:1px solid var(--border);border-radius:14px 14px 14px 4px;color:var(--text)}
.tbubble.user{background:var(--accent);color:var(--lighter);border-radius:14px 14px 4px 14px}
#thunder-typing{display:none;padding:4px 12px;font-size:11px;color:var(--muted);font-style:italic;flex-shrink:0}
.thunder-input-row{border-top:1px solid var(--border);padding:9px;display:flex;gap:7px;flex-shrink:0;background:var(--lighter)}
#thunder-input{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text)}
#thunder-input:focus{border-color:var(--accent)}
.thunder-send-btn{background:var(--accent);color:var(--lighter);border:none;padding:8px 13px;border-radius:6px;font-weight:900;font-size:14px;cursor:pointer}
.thunder-send-btn:hover{opacity:.85}

</style>
</head>

/* =====================================================================
   

SANDBOX 2: FEED â€” Direct YouTube RSS + proxy fallbacks
   ===================================================================== */
var Feed = (function() {
  var BATCH = 8;

  function getVid(url) {
    if (!url) return null;
    var m = url.match(/[?&]v=([A-Za-z0-9_-]{11})/) || url.match(/youtu\.be\/([A-Za-z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  function thumbUrl(vid) {
    return vid ? 'https://img.youtube.com/vi/' + vid + '/mqdefault.jpg' : null;
  }

  function embedUrl(vid) {
    return 'https://www.youtube.com/embed/' + vid + '?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3&showinfo=0&fs=1&enablejsapi=1';
  }

  function fmtDate(s) {
    try { return new Date(s).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }
    catch(e) { return ''; }
  }

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function parseXMLItems(xmlText) {
    var items = [], entryRegex = /<entry>([\s\S]*?)<\/entry>/g, m;
    while ((m = entryRegex.exec(xmlText)) !== null) {
      var block = m[1];
      var vidMatch   = block.match(/<yt:videoId>([^<]+)<\/yt:videoId>/);
      var titleMatch = block.match(/<title>([^<]*)<\/title>/);
      var pubMatch   = block.match(/<published>([^<]+)<\/published>/);
      var thumbMatch = block.match(/url="(https:\/\/i[^"]+)"/);
      if (vidMatch) {
        var vid = vidMatch[1].trim();
        items.push({
          link: 'https://www.youtube.com/watch?v=' + vid,
          title: titleMatch ? titleMatch[1].replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>') : 'Untitled',
          pubDate: pubMatch ? pubMatch[1] : '',
          thumbnail: thumbMatch ? thumbMatch[1] : thumbUrl(vid)
        });
      }
    }
    return items;
  }

  function fetchFeed(feedUrl, onSuccess, onError) {
    /* Robust async cascade: direct -> rss2json -> allorigins -> corsproxy -> codetabs -> XHR
       Works from file://, content://, and https:// origins. */
    (async function() {
      function parseOrThrow(xml, label) {
        var items = parseXMLItems(xml);
        if (items.length === 0) throw new Error(label + ' empty');
        return items;
      }

      /* 1. Direct fetch -- YT RSS sends CORS * so works from most origins */
      try {
        var r1 = await fetch(feedUrl, { cache: 'no-store' });
        if (!r1.ok) throw new Error('direct ' + r1.status);
        return onSuccess(parseOrThrow(await r1.text(), 'direct'));
      } catch(e1) {}

      /* 2. rss2json */
      try {
        var r2 = await fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(feedUrl));
        var d2 = await r2.json();
        if (d2.status === 'ok' && d2.items && d2.items.length > 0) {
          var items2 = d2.items.filter(function(i){ return i.link && getVid(i.link); });
          if (items2.length > 0) return onSuccess(items2);
        }
        throw new Error('rss2json empty');
      } catch(e2) {}

      /* 3. allorigins */
      try {
        var r3 = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(feedUrl));
        var d3 = await r3.json();
        return onSuccess(parseOrThrow(d3.contents || '', 'allorigins'));
      } catch(e3) {}

      /* 4. corsproxy.io */
      try {
        var r4 = await fetch('https://corsproxy.io/?' + encodeURIComponent(feedUrl));
        if (!r4.ok) throw new Error('corsproxy ' + r4.status);
        return onSuccess(parseOrThrow(await r4.text(), 'corsproxy'));
      } catch(e4) {}

      /* 5. codetabs */
      try {
        var r5 = await fetch('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(feedUrl));
        if (!r5.ok) throw new Error('codetabs ' + r5.status);
        return onSuccess(parseOrThrow(await r5.text(), 'codetabs'));
      } catch(e5) {}

      /* 6. XMLHttpRequest -- different CORS handling in some Android WebViews */
      try {
        var xhrResult = await new Promise(function(res, rej) {
          var x = new XMLHttpRequest();
          x.open('GET', feedUrl, true);
          x.timeout = 8000;
          x.onload = function() {
            if (x.status >= 200 && x.status < 300) res(x.responseText);
            else rej(new Error('xhr ' + x.status));
          };
          x.onerror = function() { rej(new Error('xhr network error')); };
          x.ontimeout = function() { rej(new Error('xhr timeout')); };
          x.send();
        });
        return onSuccess(parseOrThrow(xhrResult, 'xhr'));
      } catch(e6) {}

      /* All failed -- pass sentinel so caller shows YT link, not proxy error */
      onError('all-failed');
    })();
  }

/* â”€â”€ Attempt 6: YouTube search via multi-proxy + oEmbed (backup when RSS broken) â”€â”€ */
  function searchYouTube(channelName, onSuccess, onError) {
    var ytSearchUrl = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(channelName);

    /* Try allorigins first (handles file:// well), then corsproxy, then codetabs */
    var proxies = [
      { url: 'https://api.allorigins.win/get?url=' + encodeURIComponent(ytSearchUrl), json: true },
      { url: 'https://corsproxy.io/?' + encodeURIComponent(ytSearchUrl), json: false },
      { url: 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(ytSearchUrl), json: false }
    ];

    function extractIds(html) {
      var videoIds = [], seen = {};
      var re = /"videoId":"([a-zA-Z0-9_-]{11})"/g, m;
      while ((m = re.exec(html)) !== null) {
        if (!seen[m[1]]) { seen[m[1]] = true; videoIds.push(m[1]); }
        if (videoIds.length >= 15) break;
      }
      return videoIds;
    }

    function fetchTitlesAndReturn(videoIds) {
      var fetches = videoIds.map(function(vid) {
        return fetch('https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=' + vid + '&format=json')
          .then(function(r) { return r.json(); })
          .then(function(d) {
            return { link: 'https://www.youtube.com/watch?v=' + vid, title: d.title || 'Untitled', pubDate: '', thumbnail: d.thumbnail_url || thumbUrl(vid) };
          })
          .catch(function() {
            return { link: 'https://www.youtube.com/watch?v=' + vid, title: 'Untitled', pubDate: '', thumbnail: thumbUrl(vid) };
          });
      });
      Promise.all(fetches).then(function(items) { onSuccess(items); });
    }

    function tryProxy(idx) {
      if (idx >= proxies.length) { onError('Search failed \u2014 all proxies exhausted'); return; }
      var p = proxies[idx];
      fetch(p.url)
        .then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return p.json ? r.json() : r.text();
        })
        .then(function(d) {
          var html = p.json ? (d.contents || '') : d;
          if (typeof html !== 'string' || html.length < 200) throw new Error('empty');
          var ids = extractIds(html);
          if (ids.length === 0) throw new Error('no IDs');
          fetchTitlesAndReturn(ids);
        })
        .catch(function() { tryProxy(idx + 1); });
    }

    tryProxy(0);
  }

  return { getVid: getVid, thumbUrl: thumbUrl, embedUrl: embedUrl, fmtDate: fmtDate, esc: esc, fetchFeed: fetchFeed, searchYouTube: searchYouTube, BATCH: BATCH };
})();

SANDBOX 3: STORAGE â€” Watch Later via localStorage
   ===================================================================== */
var Storage = (function() {
  var KEY = 'trading_wl';
  var _wl = [];

  function load() {
    try { _wl = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e) { _wl = []; }
    return _wl;
  }

  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(_wl)); } catch(e) {}
    return _wl;
  }

  function getAll() { return _wl; }

  function has(vid) { return _wl.some(function(v) { return v.vid === vid; }); }

  function add(item) {
    if (!has(item.vid)) { _wl.unshift(item); save(); }
    return _wl;
  }

  function remove(vid) {
    _wl = _wl.filter(function(v) { return v.vid !== vid; });
    save();
    return _wl;
  }

  function clear() {
    _wl = []; save();
    return _wl;
  }

  function count() { return _wl.length; }

  load();
  return { getAll: getAll, has: has, add: add, remove: remove, clear: clear, count: count, load: load };
})();

var Player = (function() {
  var _vid = null, _item = null;

  var overlay = document.getElementById('player-overlay');
  var iframe  = document.getElementById('player-iframe');
  var pTitle  = document.getElementById('p-title');
  var pInfo   = document.getElementById('p-info-title');
  var pMeta   = document.getElementById('p-info-meta');
  var pLink   = document.getElementById('p-yt-link');
  var pBtn    = document.getElementById('p-wl-btn');

  /* ---- cross-browser fullscreen helpers ---- */

  /* ---- UI state ---- */
/* ---- fullscreen-change sync ---- */

  function updateBtn() {
    if (!_vid) return;
    if (Storage.has(_vid)) {
      pBtn.textContent = 'âœ“ Saved'; pBtn.classList.add('saved');
    } else {
      pBtn.textContent = '+ Watch Later'; pBtn.classList.remove('saved');
    }
  }

  function open(vid, title, date, feed, link) {
    _vid = vid;
    _item = {vid:vid, title:title, date:date, feed:feed};
    iframe.src = Feed.embedUrl(vid);
    pTitle.textContent = title;
    pInfo.textContent = title;
    pMeta.textContent = (feed||'') + (date ? ' · ' + date : '');
    pLink.href = link || ('https://www.youtube.com/watch?v=' + vid);
    updateBtn();
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function close() {
    overlay.classList.remove('active');
    iframe.src = '';
    document.body.style.overflow = '';
    _vid = null; _item = null;
  }

  function toggleWL() {
    if (!_vid || !_item) return;
    if (Storage.has(_vid)) { Storage.remove(_vid); }
    else { Storage.add(_item); }
    updateBtn();
    var wlBtn = document.querySelector('.btn-wl[data-vid="' + _vid + '"]');
    if (wlBtn) {
      wlBtn.classList.toggle('saved', Storage.has(_vid));
      wlBtn.title = Storage.has(_vid) ? 'Remove from Watch Later' : 'Watch Later';
    }
    UI.renderWL();
  }

  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') close(); });

  return { open: open, close: close, toggleWL: toggleWL, updateBtn: updateBtn };
})();

  /* ---- Channel Groups ---- */

    loadedFeeds[gridId] = true;

    Feed.fetchFeed(
      Data.feedUrl(ch),
      function(items) { renderItems(grid, items, 0, Feed.BATCH, ch.name); },
      function(err) {
        if (err === 'all-failed') {
          var seeds = Data.getSeeds(ch);
          if (seeds.length > 0) { renderItems(grid, seeds, 0, seeds.length, ch.name); return; }
        }
        Feed.searchYouTube(ch.name,
          function(items) { renderItems(grid, items, 0, Feed.BATCH, ch.name); },
          function(err2) { grid.innerHTML = '<div class="error-row">âš  ' + Feed.esc(err2) + ' â€” try again later</div>'; }
        );
      }
    );
  }

  function renderItems(grid, items, start, count, feedTitle) {
    var end = Math.min(start + count, items.length);
    for (var i = start; i < end; i++) {
      var it   = items[i];
      var vid  = Feed.getVid(it.link);
      if (!vid) continue;
      var thumb = Feed.thumbUrl(vid);
      var title = it.title || 'Untitled';
      var date  = Feed.fmtDate(it.pubDate || it.isoDate || '');
      var link  = it.link;
      var feed  = feedTitle || it.author || '';
      var inWL  = Storage.has(vid);

      var div = document.createElement('div');
      div.className = 'feed-item';
      div.setAttribute('data-vid', vid);
      div.setAttribute('data-title', title);
      div.setAttribute('data-date', date);
      div.setAttribute('data-feed', feed);
      div.setAttribute('data-link', link);

      var thumbHtml = thumb
        ? '<img class="item-thumb" src="' + Feed.esc(thumb) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
        : '<div class="thumb-placeholder">â–¶</div>';

      var isVideos = Data.videos.some(function(v){ return v.name === feedTitle; });
      var analyzeBtn = isVideos
        ? '<button class="btn-ai-analyze" data-vid="'+vid+'" data-title="'+Feed.esc(title).replace(/"/g,'&quot;')+'" data-feed="'+Feed.esc(feed)+'">âš¡ Analyse</button>'
        : '';

      div.innerHTML =
        thumbHtml +
        '<div class="item-info">' +
          '<div class="item-title">' + Feed.esc(title) + '</div>' +
          '<div class="item-date">' + Feed.esc(date) + '</div>' +
        '</div>' +
        '<div class="item-actions">' +
          '<button class="btn-play">â–¶</button>' +
          '<button class="btn-wl' + (inWL ? ' saved' : '') + '" title="' + (inWL ? 'Remove from Watch Later' : 'Watch Later') + '">ðŸ•</button>' +
          analyzeBtn +
        '</div>';

      grid.appendChild(div);
    }

    grid.addEventListener('click', function(e) {
      var target = e.target;
      if (target.classList.contains('btn-ai-analyze')) {
        var item = target.closest('.feed-item');
        AiAnalyze.run(item, target);
        return;
      }
      if (target.classList.contains('btn-play')) {
        var item = target.closest('.feed-item');
        Player.open(item.getAttribute('data-vid'), item.getAttribute('data-title'), item.getAttribute('data-date'), item.getAttribute('data-feed'), item.getAttribute('data-link'));
        return;
      }
      if (target.classList.contains('btn-wl')) {
        var item = target.closest('.feed-item');
        var vid = item.getAttribute('data-vid');
        if (Storage.has(vid)) {
          Storage.remove(vid);
          target.classList.remove('saved');
          target.title = 'Watch Later';
        } else {
          Storage.add({
            vid: vid,
            title: item.getAttribute('data-title'),
            date: item.getAttribute('data-date'),
            feed: item.getAttribute('data-feed')
          });
          target.classList.add('saved');
          target.title = 'Remove from Watch Later';
        }
        renderWL();
        Player.updateBtn();
        return;
      }
      if (target.closest('.feed-item') && !target.closest('.item-actions')) {
        var playBtn = target.closest('.feed-item').querySelector('.btn-play');
        if (playBtn) playBtn.click();
      }
    });

    var old = grid.querySelector('.load-more-wrap');
    if (old) old.remove();
    if (end < items.length) {
      var wrap = document.createElement('div');
      wrap.className = 'load-more-wrap';
      var btn = document.createElement('button');
      btn.className = 'btn-load-more';
      btn.textContent = 'â–¼ Show More (' + (items.length - end) + ' remaining)';
      btn.addEventListener('click', function() { renderItems(grid, items, end, count, feedTitle); });
      wrap.appendChild(btn);
      grid.appendChild(wrap);
    }
  }

  return { switchTab: switchTab, renderWL: renderWL, buildGroup: buildGroup, renderItems: renderItems };
})();

/* =====================================================================
   

SANDBOX 6: APP â€” Initialization and orchestration
   ===================================================================== */
var App = (function() {
  /* ---- Series Fetch Tool ---- */
  function fetchSeries() {
    var input = document.getElementById('series-input');
    var resEl = document.getElementById('series-results');
    var url   = (input.value || '').trim();
    if (!url) { alert('Please paste a YouTube Playlist or Channel URL.'); return; }

    var rssUrl = '', m;
    if ((m = url.match(/[?&]list=([^&#]+)/)))                    rssUrl = 'https://www.youtube.com/feeds/videos.xml?playlist_id=' + m[1];
    else if ((m = url.match(/channel\/([A-Za-z0-9_-]+)/)))      rssUrl = 'https://www.youtube.com/feeds/videos.xml?channel_id=' + m[1];
    else if ((m = url.match(/user\/([A-Za-z0-9_-]+)/)))         rssUrl = 'https://www.youtube.com/feeds/videos.xml?user=' + m[1];
    else if ((m = url.match(/[?&]channel_id=([A-Za-z0-9_-]+)/))) rssUrl = 'https://www.youtube.com/feeds/videos.xml?channel_id=' + m[1];
    else { alert('Paste a YouTube channel URL (/channel/UCâ€¦) or playlist URL (?list=â€¦).'); return; }

    resEl.style.display = 'block';
    resEl.innerHTML = '<div class="loading-row"><span class="spin">âŸ³</span> Fetchingâ€¦</div>';

    Feed.fetchFeed(
      rssUrl,
      function(items) {
        resEl.innerHTML = '<div style="font-size:11px;font-weight:900;color:var(--series-hl);padding:4px 0 10px;">ðŸ“º ' + items.length + ' videos found</div>';
        UI.renderItems(resEl, items, 0, Feed.BATCH, 'Playlist');
      },
      function(err) {
        resEl.innerHTML = '<div class="error-row">âš  ' + Feed.esc(err) + '</div>';
      }
    );
  }

  /* ---- PWA ---- */
  function pwaTriggerInstall() {
    if (window._pwaPrompt) {
      window._pwaPrompt.prompt();
      window._pwaPrompt.userChoice.then(function() { window._pwaPrompt = null; document.getElementById('pwa-badge').style.display = 'none'; });
    }
  }

  /* ---- Init ---- */
  function init() {
    var rc = document.getElementById('retro-channels');
    Data.retro.forEach(function(ch) { UI.buildGroup(ch, 'retro', rc); });
  }

  init();

  return { fetchSeries: fetchSeries, pwaTriggerInstall: pwaTriggerInstall };
})();
