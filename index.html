<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" id="manifest-link">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22%3E%3Crect width=%2232%22 height=%2232%22 rx=%226%22 fill=%22%230f0f0f%22/%3E%3Cpath d=%22M12 9l14 7-14 7V9z%22 fill=%22%235b8cde%22/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 192 192%22%3E%3Crect width=%22192%22 height=%22192%22 rx=%2224%22 fill=%22%230f0f0f%22/%3E%3Cpath d=%22M70 53l82 43-82 43V53z%22 fill=%22%235b8cde%22/%3E%3C/svg%3E">
<title>Local Player</title>
<style>
/* &#9472;&#9472; Reset & Base &#9472;&#9472; */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #0f0f0f;
  --surface:   #1a1a1a;
  --surface2:  #242424;
  --border:    #2e2e2e;
  --text:      #e8e8e8;
  --muted:     #888;
  --accent:    #e8a020;
  --accent2:   #c47010;
  --danger:    #e85040;
  --lv-hl:     #5b8cde;
  --lv-hl2:   #3a6abf;
  --radius:    10px;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; overscroll-behavior: none; }

/* &#9472;&#9472; Header &#9472;&#9472; */
.app-header {
  background: linear-gradient(135deg, #1a2a4a 0%, #0d1a30 100%);
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.app-header h1 { font-size: 20px; font-weight: 900; color: var(--lv-hl); letter-spacing: .04em; }
.app-header p  { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-top: 2px; }

/* &#9472;&#9472; Controls &#9472;&#9472; */
.controls {
  display: flex; gap: 8px; align-items: center;
  padding: 10px 12px; background: var(--surface); border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.btn {
  padding: 10px 18px; border: none; border-radius: var(--radius);
  font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: .04em;
  transition: opacity .15s; min-height: 44px; touch-action: manipulation;
}
.btn:active { opacity: .7; }
.btn-pick   { background: var(--lv-hl); color: #fff; }
.btn-sort   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-on     { background: var(--accent2); color: #fff; border: 1px solid var(--accent); }
.search-box {
  flex: 1; min-width: 120px;
  padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-size: 14px; min-height: 44px;
}
.search-box::placeholder { color: var(--muted); }
.count-badge {
  font-size: 11px; color: var(--muted); white-space: nowrap;
  padding: 0 4px;
}

/* &#9472;&#9472; File Grid &#9472;&#9472; */
.file-list {
  overflow-y: auto; max-height: calc(100vh - 180px);
}
.file-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; cursor: pointer; transition: background .15s;
  border-bottom: 1px solid rgba(255,255,255,.06); touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  min-height: 56px;
}
.file-item:active { background: rgba(255,255,255,.08); }
.file-item .play-icon {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--lv-hl); color: #fff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 16px;
}
.file-item .play-icon.audio { background: #b87c2e; }
.file-item-info { flex: 1; min-width: 0; }
.file-item-name {
  font-size: 15px; font-weight: 600; line-height: 1.3; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.file-item-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* &#9472;&#9472; Empty / Error states &#9472;&#9472; */
.state-msg {
  text-align: center; padding: 60px 24px; color: var(--muted);
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.state-msg .icon { font-size: 48px; }
.state-msg h2 { font-size: 18px; color: var(--text); font-weight: 700; }
.state-msg p  { font-size: 13px; line-height: 1.5; }

/* &#9472;&#9472; Player Overlay &#9472;&#9472; */
/* MIUI/HyperOS: use viewport-fit=cover + safe-area insets for notch/punch-hole */
#player-overlay {
  display: none; position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 9999; background: #000;
  flex-direction: column;
  padding-top: env(safe-area-inset-top, 0px);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  padding-left: env(safe-area-inset-left, 0px);
  padding-right: env(safe-area-inset-right, 0px);
}
#player-overlay.active { display: flex; }
/* Native fullscreen: stretch edge-to-edge, remove safe-area padding */
#player-overlay:-webkit-full-screen,
#player-overlay:fullscreen {
  padding: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
}
.player-topbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; background: rgba(0,0,0,.85);
  position: absolute; top: 0; left: 0; right: 0; z-index: 10020;
  padding-top: max(8px, env(safe-area-inset-top, 8px));
  padding-left: max(12px, env(safe-area-inset-left, 12px));
  padding-right: max(12px, env(safe-area-inset-right, 12px));
}
.btn-close {
  padding: 10px 16px; background: var(--danger); color: #fff;
  border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer;
  white-space: nowrap; min-height: 44px; touch-action: manipulation;
}
.player-ttl {
  flex: 1; font-size: 14px; font-weight: 700; color: #fff;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.btn-nav {
  padding: 10px 12px; background: var(--surface2); color: #fff;
  border: none; border-radius: 6px; font-size: 18px; cursor: pointer;
  min-height: 44px; min-width: 44px; touch-action: manipulation;
  display: flex; align-items: center; justify-content: center;
}
#local-video {
  /* No fixed aspect-ratio &#8212; fill flex space naturally in portrait and landscape */
  width: 100%; flex: 1; min-height: 0; object-fit: contain; background: #000;
}
/* In native fullscreen the video IS the fullscreen element &#8212; fill everything */
#local-video:-webkit-full-screen { width: 100vw; height: 100vh; object-fit: contain; }
#local-video:fullscreen          { width: 100vw; height: 100vh; object-fit: contain; }

/* &#9472;&#9472; SponsorBlock timeline &#9472;&#9472; */
#sb-timeline-wrap {
  position: relative; width: 100%; height: 8px;
  background: rgba(255,255,255,.12); cursor: pointer;
  touch-action: none; flex-shrink: 0;
}
#sb-timeline-wrap:active { height: 12px; }
.sb-progress {
  position: absolute; top: 0; left: 0; height: 100%;
  background: var(--lv-hl); pointer-events: none; z-index: 1;
  transition: width .1s linear;
}
.sb-seg {
  position: absolute; top: 0; height: 100%;
  /* background set per-segment by JS for category colour */
  opacity: .82; pointer-events: none; z-index: 2;
  border-radius: 2px;
}

/* &#9472;&#9472; SponsorBlock bar &#9472;&#9472; */
#sb-bar {
  display: none; flex-shrink: 0;
  padding: 6px 12px; background: rgba(0,0,0,.88);
  font-size: 11px; color: #e8e8e8; text-align: center; z-index: 10;
  min-height: 32px;
}
#sb-bar.visible { display: flex; gap: 6px; align-items: center; justify-content: center; flex-wrap: wrap; }
#sb-bar .sb-stat { color: var(--muted); font-size: 10px; }
#sb-toggle-btn:active { opacity: .75; }

/* &#9472;&#9472; Scrollbar &#9472;&#9472; */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* &#9472;&#9472; PWA Install badge &#9472;&#9472; */
#pwa-badge {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 99999; background: var(--lv-hl); color: #fff; font-weight: 700;
  font-size: 14px; padding: 12px 24px; border-radius: 24px; cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4); display: none;
  text-transform: uppercase; letter-spacing: .06em;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
</style>
</head>
<body>

<div class="app-header">
  <h1>&#128241; Local Player</h1>
  <p>Videos & Songs &#183; Phone Storage &#183; No Network</p>
</div>

<div class="controls">
  <button class="btn btn-pick" onclick="LV.pickFolder()">&#128194; Open Folder</button>
  <input class="search-box" type="search" placeholder="&#128269; Search&#8230;" oninput="LV.search(this.value)" id="lv-search">
  <button class="btn btn-sort" onclick="LV.playAll()" id="lv-playall-btn">&#9654; Play All</button>
  <button class="btn btn-sort" onclick="LV.toggleSort()" id="lv-sort-btn">&#8645; Name</button>
  <button class="btn btn-sort" onclick="LV.toggleShuffle()" id="lv-shuffle-btn">&#128256; Off</button>
  <span class="count-badge" id="lv-count"></span>
</div>

<div id="lv-grid" class="file-list">
  <div class="state-msg">
    <div class="icon">&#128194;</div>
    <h2>No folder open</h2>
    <p>Tap <strong>Open Folder</strong> to pick your video folder from phone storage.<br>Plays entirely offline &#8212; no network needed.</p>
  </div>
</div>

<!-- Player Overlay -->
<div id="player-overlay">
  <div class="player-topbar">
    <button class="btn-close" onclick="LV.close()">&#10005; Close</button>
    <span class="player-ttl" id="lv-player-title">Loading&#8230;</span>
    <button class="btn-nav" onclick="LV.prevTrack()" id="lv-prev-btn">&#9198;</button>
    <button class="btn-nav" onclick="LV.playNext()" id="lv-next-btn">&#9197;</button>
  </div>
  <video id="local-video" playsinline preload="metadata"></video>
  <div id="sb-timeline-wrap"><div class="sb-progress" id="sb-progress"></div></div>
  <div id="sb-bar"></div>
</div>

<div id="pwa-badge" onclick="LV.installPWA()">&#11015; Install App</div>

<script>
/* =====================================================================
   LOCAL PLAYER \u2014 Standalone app
   Sandbox: completely self-contained, zero shared code.
   Player: <video>/<audio> element, no iframe, no CORS, no network for playback.
   SponsorBlock: placeholder #sb-bar ready for integration.
   ===================================================================== */
var LV = (function() {

  /* \u2500\u2500 Config \u2500\u2500 */
  var CONFIG = {
    dbName: 'LocalVideosDB',
    storeName: 'session',
    cacheStore: 'fileCache',
    version: 2
  };

  /* \u2500\u2500 State \u2500\u2500 */
  var _files      = [];
  var _filtered   = [];
  var _sortMode   = 'name';  // 'name' | 'date' | 'size'
  var _currentIdx = null;
  var _rootName   = '';
  var _shuffleMode = false;
  var _playedIndices = [];
  var _saveTimer  = null;
  var _autoPlayMode = false; // true when Play All / shuffle auto-advance
  var _userMuted    = false; // true when user explicitly muted via unmute banner

  /* \u2500\u2500 DOM refs \u2500\u2500 */
  var grid      = document.getElementById('lv-grid');
  var overlay   = document.getElementById('player-overlay');
  var videoEl   = document.getElementById('local-video');
  var titleEl   = document.getElementById('lv-player-title');
  var countEl   = document.getElementById('lv-count');
  var sortBtn   = document.getElementById('lv-sort-btn');
  var shuffleBtn = document.getElementById('lv-shuffle-btn');
  var sbBar     = document.getElementById('sb-bar');
  var sbTimeline = document.getElementById('sb-timeline-wrap');
  var sbProgress = document.getElementById('sb-progress');

  /* \u2500\u2500 Pull to refresh \u2500\u2500 */
  var _pullStartY    = 0;
  var _pullThreshold = 70;
  var _pullActive    = false;
  var _pullDelta     = 0;      // track delta independently, not from transform string
  var _pullIndicator = null;   // spinner element

  /* \u2500\u2500 Gesture controls (brightness/volume) \u2500\u2500 */
  var _gestureActive = null; // 'brightness' | 'volume'
  var _gestureStartY = 0;
  var _gestureStartVal = 0;
  var _brightnessOverlay = null;
  var _volumeOverlay = null;

  /* \u2500\u2500 Supported video formats \u2500\u2500 */
  var MEDIA_EXTS = /\.(mp4|mkv|webm|mov|avi|m4v|3gp|ts|flv|wmv|mp3|wav|flac|aac|ogg|m4a|opus|wma)$/i;
  var AUDIO_EXTS = /\.(mp3|wav|flac|aac|ogg|m4a|opus|wma)$/i;

  /* \u2500\u2500 Format file size \u2500\u2500 */
  function fmtSize(bytes) {
    if (!bytes) return '';
    if (bytes > 1e9) return (bytes/1e9).toFixed(1) + ' GB';
    if (bytes > 1e6) return (bytes/1e6).toFixed(1) + ' MB';
    return (bytes/1e3).toFixed(0) + ' KB';
  }

  /* \u2500\u2500 Audio detection \u2500\u2500 */
  function isAudio(name) { return AUDIO_EXTS.test(name); }

  /* \u2500\u2500 Format duration \u2500\u2500 */
  function fmtDuration(secs) {
    if (!secs || isNaN(secs)) return '';
    var h = Math.floor(secs/3600);
    var m = Math.floor((secs%3600)/60);
    var s = Math.floor(secs%60);
    if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    return m + ':' + String(s).padStart(2,'0');
  }

  /* \u2500\u2500 IndexedDB persistence \u2500\u2500 */
  function openDB() {
    return new Promise(function(resolve, reject) {
      var req = indexedDB.open(CONFIG.dbName, CONFIG.version);
      req.onupgradeneeded = function() {
        var db = req.result;
        if (!db.objectStoreNames.contains(CONFIG.storeName))
          db.createObjectStore(CONFIG.storeName);
        if (!db.objectStoreNames.contains(CONFIG.cacheStore))
          db.createObjectStore(CONFIG.cacheStore);
      };
      req.onsuccess = function() { resolve(req.result); };
      req.onerror = function() { reject(req.error); };
    });
  }

  function storeHandle(handle) {
    openDB().then(function(db) {
      var tx = db.transaction(CONFIG.storeName, 'readwrite');
      var req = tx.objectStore(CONFIG.storeName).put(handle, 'dirHandle');
      req.onerror = function() {}; // silent fail \u2014 not critical
    }).catch(function(){});
  }

  function loadHandle() {
    return openDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction(CONFIG.storeName, 'readonly');
        var req = tx.objectStore(CONFIG.storeName).get('dirHandle');
        req.onsuccess = function() { resolve(req.result || null); };
        req.onerror = function() { resolve(null); };
      });
    }).catch(function() { return null; });
  }

  function storeRootName(name) {
    try { localStorage.setItem('lv_rootName', name); } catch(e) {}
  }

  function loadRootName() {
    try { return localStorage.getItem('lv_rootName') || ''; } catch(e) { return ''; }
  }

  /* \u2500\u2500 File cache (IndexedDB) \u2500\u2500 */
  function saveFileCache(files) {
    // Store file metadata (no blob URLs — they don't persist)
    var cache = files.map(function(f) {
      return { name: f.name, ext: f.ext, size: f.size };
    });
    openDB().then(function(db) {
      var tx = db.transaction(CONFIG.cacheStore, 'readwrite');
      tx.objectStore(CONFIG.cacheStore).put(cache, 'files');
    }).catch(function(){});
  }

  function loadFileCache() {
    return openDB().then(function(db) {
      return new Promise(function(resolve) {
        var tx = db.transaction(CONFIG.cacheStore, 'readonly');
        var req = tx.objectStore(CONFIG.cacheStore).get('files');
        req.onsuccess = function() { resolve(req.result || []); };
        req.onerror = function() { resolve([]); };
      });
    }).catch(function() { return []; });
  }

  function updateHeader() {
    var h = document.querySelector('.app-header h1');
    if (h) h.textContent = _rootName ? '\uD83D\uDCC1 ' + _rootName : '\uD83D\uDCF1 Local Player';
  }

  /* \u2500\u2500 Playback persistence \u2500\u2500 */
  function saveState() {
    try {
      if (_currentIdx !== null) localStorage.setItem('lv_idx', _currentIdx);
      if (videoEl.duration && isFinite(videoEl.duration))
        localStorage.setItem('lv_time', videoEl.currentTime);
    } catch(e) {}
  }

  function loadState() {
    try {
      var idx = localStorage.getItem('lv_idx');
      var time = localStorage.getItem('lv_time');
      return { idx: idx !== null ? parseInt(idx, 10) : null, time: time !== null ? parseFloat(time) : 0 };
    } catch(e) { return { idx: null, time: 0 }; }
  }

  /* \u2500\u2500 Shuffle \u2500\u2500 */
  function toggleShuffle() {
    _shuffleMode = !_shuffleMode;
    _playedIndices = [];
    shuffleBtn.textContent = _shuffleMode ? '\uD83D\uDD00 On' : '\uD83D\uDD00 Off';
    shuffleBtn.className = 'btn ' + (_shuffleMode ? 'btn-on' : 'btn-sort');
  }

  function prevTrack() {
    if (!_filtered.length) return;
    _autoPlayMode = true;
    if (_currentIdx === null) return play(_filtered[_filtered.length - 1].idx, true);
    var curPos = -1;
    _filtered.forEach(function(f, i) { if (f.idx === _currentIdx) curPos = i; });
    if (curPos === -1) return play(_filtered[_filtered.length - 1].idx, true);
    var prev = (curPos - 1 + _filtered.length) % _filtered.length;
    play(_filtered[prev].idx, true);
  }

  function playAll() {
    if (!_filtered.length) return;
    var idx = _filtered[0].idx;
    _shuffleMode = false;
    _playedIndices = [];
    _autoPlayMode = true;
    shuffleBtn.textContent = '\uD83D\uDD00 Off';
    shuffleBtn.className = 'btn btn-sort';
    play(idx, true);
  }

  function nextShuffleIdx() {
    if (!_filtered.length) return null;
    if (_playedIndices.length >= _filtered.length) _playedIndices = [];
    var available = [];
    _filtered.forEach(function(f) {
      if (_playedIndices.indexOf(f.idx) === -1) available.push(f.idx);
    });
    if (!available.length) return null;
    var pick = available[Math.floor(Math.random() * available.length)];
    _playedIndices.push(pick);
    return pick;
  }

  function nextSequentialIdx() {
    if (!_filtered.length) return null;
    if (_currentIdx === null) return _filtered[0].idx;
    var curPos = -1;
    _filtered.forEach(function(f, i) { if (f.idx === _currentIdx) curPos = i; });
    if (curPos === -1) return _filtered[0].idx;
    var next = (curPos + 1) % _filtered.length;
    return _filtered[next].idx;
  }

  function playNext() {
    var idx = _shuffleMode ? nextShuffleIdx() : nextSequentialIdx();
    if (idx === null) return;
    // Always treat next/skip as auto-play so playback continues
    _autoPlayMode = true;
    play(idx, true);
  }

  /* \u2500\u2500 Pick folder \u2500\u2500 */
  function pickFolder() {
    /* file:// protocol kills showDirectoryPicker (needs HTTPS).
       Try it only on secure contexts; fall back to webkitdirectory,
       then plain <input multiple> as last resort for mobile. */
    if (window.showDirectoryPicker && location.protocol !== 'file:' && location.protocol !== 'content:') {
      window.showDirectoryPicker({ mode: 'read' })
        .then(function(dirHandle) {
          _cachedDirHandle = dirHandle;
          storeHandle(dirHandle);
          _rootName = dirHandle.name;
          storeRootName(_rootName);
          updateHeader();
          return scanDir(dirHandle);
        })
        .then(function(files) { loadFiles(files); })
        .catch(function(e) {
          if (e.name !== 'AbortError') webkitFallback();
        });
    } else if (document.createElement('input').webkitdirectory !== undefined) {
      webkitFallback();
    } else {
      simpleFilePicker();
    }
  }

  function webkitFallback() {
    var inp = document.createElement('input');
    inp.type = 'file';
    inp.multiple = true;
    inp.accept = 'video/*,audio/*';
    inp.setAttribute('webkitdirectory', '');
    inp.onchange = function() {
      var files = Array.from(inp.files)
        .filter(function(f) { return MEDIA_EXTS.test(f.name); })
        .map(function(f) {
          return { file: f, name: f.name, displayName: f.name, ext: f.name.split('.').pop().toUpperCase(),
                   size: f.size, url: URL.createObjectURL(f) };
        });
      _rootName = 'Selected Files';
      storeRootName(_rootName);
      updateHeader();
      loadFiles(files);
    };
    inp.click();
  }

  function simpleFilePicker() {
    var inp = document.createElement('input');
    inp.type = 'file';
    inp.multiple = true;
    inp.accept = 'video/*,audio/*';
    inp.onchange = function() {
      var files = Array.from(inp.files)
        .filter(function(f) { return MEDIA_EXTS.test(f.name); })
        .map(function(f) {
          return { file: f, name: f.name, displayName: f.name, ext: f.name.split('.').pop().toUpperCase(),
                   size: f.size, url: URL.createObjectURL(f) };
        });
      _rootName = 'Selected Files';
      storeRootName(_rootName);
      updateHeader();
      loadFiles(files);
    };
    inp.click();
  }

  function refreshFolder() {
    var handlePromise = _cachedDirHandle ? Promise.resolve(_cachedDirHandle) : loadHandle();
    handlePromise.then(function(handle) {
      if (!handle) return;
      handle.queryPermission({ mode: 'read' }).then(function(status) {
        if (status === 'granted') {
          doRefresh(handle);
        } else if (status === 'prompt') {
          // Permission can still be requested \u2014 do so
          handle.requestPermission({ mode: 'read' }).then(function(newStatus) {
            if (newStatus === 'granted') {
              doRefresh(handle);
            } else {
              showRefreshToast('\u26A0\uFE0F Permission denied \u2014 tap Open Folder');
            }
          }).catch(function() {
            showRefreshToast('\u26A0\uFE0F Permission error \u2014 tap Open Folder');
          });
        } else {
          // 'denied' \u2014 user must re-pick folder
          showRefreshToast('\u26A0\uFE0F Permission lost \u2014 tap Open Folder');
        }
      });
    });
  }

  function doRefresh(handle) {
    scanDir(handle).then(function(files) {
      loadFiles(files);
      showRefreshToast('\u2713 Refreshed \u2014 ' + files.length + ' file' + (files.length !== 1 ? 's' : ''));
    });
  }

  function showRefreshToast(msg) {
    var t = document.getElementById('refresh-toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'refresh-toast';
      t.style.cssText = 'position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:9001;background:rgba(0,0,0,0.85);color:#fff;font-size:13px;font-weight:700;padding:8px 20px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap;';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(t._timer);
    t._timer = setTimeout(function() { t.style.opacity = '0'; }, 2200);
  }

  async function scanDir(dirHandle, prefix) {
    var results = [];
    prefix = prefix || '';
    for await (var entry of dirHandle.values()) {
      if (entry.kind === 'file' && MEDIA_EXTS.test(entry.name)) {
        try {
          var file = await entry.getFile();
          results.push({
            file: file, name: entry.name,
            displayName: prefix ? prefix + '/' + entry.name : entry.name,
            ext: entry.name.split('.').pop().toUpperCase(),
            size: file.size, url: URL.createObjectURL(file)
          });
        } catch(e) {} // skip unreadable files silently
      } else if (entry.kind === 'directory') {
        try {
          // Check/request permission on each subdir \u2014 subdirs do NOT
          // automatically inherit permission from the root handle on Android.
          // Without this, entry.values() silently hangs forever.
          var perm = await entry.queryPermission({ mode: 'read' });
          if (perm !== 'granted') {
            perm = await entry.requestPermission({ mode: 'read' });
          }
          if (perm === 'granted') {
            var sub = await scanDir(entry, prefix ? prefix + '/' + entry.name : entry.name);
            results = results.concat(sub);
          }
        } catch(e) {} // skip inaccessible subdirs silently
      }
    }
    return results;
  }

  /* \u2500\u2500 Load files into state \u2500\u2500 */
  function loadFiles(files) {
    // Revoke old blob URLs to free memory before replacing list
    _files.forEach(function(f) {
      if (f.url && f.url.startsWith('blob:')) {
        try { URL.revokeObjectURL(f.url); } catch(e) {}
      }
    });
    _files = files;
    _files.forEach(function(f, i) { f.idx = i; });
    sortFiles();
    renderGrid(_filtered);
    // Cache metadata for instant load on next restart
    if (files.length > 0) saveFileCache(files);
  }

  /* \u2500\u2500 Sort \u2500\u2500 */
  function sortFiles() {
    _filtered = _files.slice();
    var q = (document.getElementById('lv-search') || {}).value || '';
    if (q) {
      var ql = q.toLowerCase();
      _filtered = _filtered.filter(function(f) { return f.name.toLowerCase().includes(ql); });
    }
    if (_sortMode === 'name') {
      _filtered.sort(function(a,b) { return a.name.localeCompare(b.name); });
    } else if (_sortMode === 'size') {
      _filtered.sort(function(a,b) { return b.size - a.size; });
    } else if (_sortMode === 'date') {
      _filtered.sort(function(a,b) { return (b.file.lastModified||0) - (a.file.lastModified||0); });
    }
  }

  function toggleSort() {
    var modes = ['name','size','date'];
    var labels = { name: '\u21C5 Name', size: '\u21C5 Size', date: '\u21C5 Date' };
    var idx = modes.indexOf(_sortMode);
    _sortMode = modes[(idx+1) % modes.length];
    sortBtn.textContent = labels[_sortMode];
    sortFiles();
    renderGrid(_filtered);
  }

  function search(q) {
    sortFiles();
    renderGrid(_filtered);
  }

  /* \u2500\u2500 Render list \u2500\u2500 */
  function renderGrid(files) {
    var allAudio = files.length && files.every(function(f) { return isAudio(f.name); });
    var label = allAudio ? 'song' : 'media';
    var cached = files.length && files[0] && files[0].cached;
    countEl.textContent = files.length + ' ' + label + (files.length !== 1 ? 's' : '') + (cached ? ' \u2014 tap to play' : '');
    if (files.length === 0) {
      grid.innerHTML = _files.length === 0
        ? '<div class="state-msg"><div class="icon">\uD83D\uDCC2</div><h2>No folder open</h2><p>Tap <strong>Open Folder</strong> to load your media.</p></div>'
        : '<div class="state-msg"><div class="icon">\uD83D\uDD0D</div><h2>No results</h2><p>No media match your search.</p></div>';
      return;
    }
    grid.innerHTML = '';
    files.forEach(function(f) {
      var item = document.createElement('div');
      item.className = 'file-item';
      item.dataset.idx = f.idx;

      var nameNoExt = f.name.replace(/\.[^.]+$/, '');
      var meta = f.ext + (f.size ? ' \u00B7 ' + fmtSize(f.size) : '');
      var isAud = isAudio(f.name);

      item.innerHTML =
        '<span class="play-icon' + (isAud ? ' audio' : '') + '">' + (isAud ? '\uD83C\uDFB5' : '\u25B6') + '</span>' +
        '<div class="file-item-info">' +
          '<div class="file-item-name">' + esc(nameNoExt) + '</div>' +
          '<div class="file-item-meta">' + esc(meta) + '</div>' +
        '</div>';

      if (f.cached) {
        // Cached file — need permission to play
        item.addEventListener('click', function() { playCached(f.idx); });
      } else {
        item.addEventListener('click', function() { play(f.idx); });
      }
      grid.appendChild(item);
    });
  }

  /* \u2500\u2500 Play \u2500\u2500 */
  function play(idx, autoPlay) {
    var f = _files[idx];
    if (!f) return;
    _currentIdx = idx;
    saveState();

    // If user manually clicks a video (not auto-advance), disable auto-play mode
    if (autoPlay !== true) {
      _autoPlayMode = false;
      hideUnmuteBanner(); // user has a gesture \u2014 no need for muted banner
      _userMuted = false;
    }

    titleEl.textContent = f.name.replace(/\.[^.]+$/, '');
    videoEl.src = f.url;
    // Do NOT call videoEl.load() — it resets the muted attribute from the HTML
    // and breaks the gesture chain needed for autoplay. Setting .src is enough;
    // the browser loads automatically when play() is called.
    videoEl.style.filter = '';  // reset brightness on new file
    _brightnessVal = 1.0;

    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';

    // Autoplay strategy:
    // - Video 1 (user gesture): unmute immediately \u2014 gesture chain is intact.
    // - Videos 2+ (auto-advance from 'ended' event): keep muted \u2014 no gesture,
    //   so unmuted autoplay is blocked on Android Chrome/MIUI. Show an unmute
    //   banner instead so the user taps once to restore sound for the session.
    if (autoPlay === true && _autoPlayMode) {
      // Auto-advance: play muted to guarantee playback, show unmute banner
      videoEl.muted = true;
      var playPromise = videoEl.play();
      if (playPromise) {
        playPromise.then(function() {
          if (!_userMuted) showUnmuteBanner();
        }).catch(function(err) {
          // Even muted play blocked \u2014 extremely rare, show tap-to-play hint
          showTapToPlayHint();
        });
      }
    } else {
      // User-initiated: gesture chain intact \u2014 play unmuted directly
      videoEl.muted = false;
      var playPromise = videoEl.play();
      if (playPromise) {
        playPromise.catch(function() {
          // Fallback: try muted
          videoEl.muted = true;
          videoEl.play().then(function() {
            showUnmuteBanner();
          }).catch(function() {});
        });
      }
    }

    // MIUI/HyperOS (Poco M6 Pro 5G) fullscreen + orientation strategy:
    //   1. Fullscreen must be called on the OVERLAY DIV, not the <video>.
    //      On MIUI Chrome, video.requestFullscreen() hijacks to the system player,
    //      losing all our custom controls.
    //   2. screen.orientation.lock() must be called INSIDE the fullscreen .then()
    //      callback \u2014 calling it before fullscreen resolves is silently ignored on MIUI.
    //   3. 'landscape' (not 'landscape-primary') for broadest MIUI version compat.
    //   4. Fallback: if fullscreen is denied (file:// or iframe), use CSS transform
    //      to rotate the overlay manually into landscape.
    requestFullscreenAndLock(overlay);

    // Setup gesture controls (brightness left 30%, volume right 30%)
    setupGestureControls();

    // SponsorBlock fetch in background (non-blocking)
    onVideoOpen(f, null);
  }

  /* \u2500\u2500 Play a cached file (needs permission first) \u2500\u2500 */
  function playCached(idx) {
    var f = _files[idx];
    if (!f || !f.cached) return;

    // Show loading state on the item
    var item = grid.querySelector('[data-idx="' + idx + '"]');
    var playIcon = item ? item.querySelector('.play-icon') : null;
    if (playIcon) playIcon.textContent = '\u23F3';

    function tryPlayWithHandle(handle) {
      if (!handle) {
        showRefreshToast('\u26A0\uFE0F No folder access \u2014 tap Open Folder');
        if (playIcon) playIcon.textContent = isAudio(f.name) ? '\uD83C\uDFB5' : '\u25B6';
        return;
      }
      _cachedDirHandle = handle;
      handle.requestPermission({ mode: 'read' }).then(function(status) {
        if (status !== 'granted') {
          showRefreshToast('\u26A0\uFE0F Permission denied \u2014 tap Open Folder');
          if (playIcon) playIcon.textContent = isAudio(f.name) ? '\uD83C\uDFB5' : '\u25B6';
          return;
        }
        scanDir(handle).then(function(files) {
          loadFiles(files);
          _files.forEach(function(x) { x.cached = false; });
          var refreshed = _files.find(function(x) { return x.name === f.name; });
          if (refreshed) {
            play(refreshed.idx);
            // Ensure unmuted — user tapped, so gesture chain is intact
            videoEl.muted = false;
            hideUnmuteBanner();
          }
        });
      }).catch(function() {
        showRefreshToast('\u26A0\uFE0F Permission error \u2014 tap Open Folder');
        if (playIcon) playIcon.textContent = isAudio(f.name) ? '\uD83C\uDFB5' : '\u25B6';
      });
    }

    // If handle already loaded, use it. Otherwise load from IndexedDB first.
    if (_cachedDirHandle) {
      tryPlayWithHandle(_cachedDirHandle);
    } else {
      loadHandle().then(function(handle) {
        tryPlayWithHandle(handle);
      });
    }
  }

  function showOrientationHint() {
    var hint = document.createElement('div');
    hint.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.9);color:#fff;padding:20px 30px;border-radius:12px;z-index:10000;font-size:16px;text-align:center;max-width:90%';
    hint.innerHTML = '\ud83d\udd04 Rotate phone to landscape for best view';
    document.body.appendChild(hint);
    setTimeout(function() {
      hint.style.opacity = '0';
      hint.style.transition = 'opacity 0.5s';
      setTimeout(function() { hint.remove(); }, 500);
    }, 3000);
  }

  /* \u2500\u2500 Unmute banner (shown on auto-advance when gesture chain is broken) \u2500\u2500 */
  var _unmuteBanner = null;
  function showUnmuteBanner() {
    if (_unmuteBanner) return; // already showing
    _unmuteBanner = document.createElement('div');
    _unmuteBanner.style.cssText = [
      'position:fixed;bottom:80px;left:50%;transform:translateX(-50%)',
      'z-index:10020;background:rgba(0,0,0,0.88);color:#fff',
      'font-size:15px;font-weight:700;padding:12px 24px',
      'border-radius:24px;cursor:pointer;border:2px solid var(--lv-hl)',
      'touch-action:manipulation;-webkit-tap-highlight-color:transparent',
      'white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.5)'
    ].join(';');
    _unmuteBanner.textContent = '\uD83D\uDD07 Tap to unmute';
    _unmuteBanner.addEventListener('click', function() {
      videoEl.muted = false;
      _userMuted = false;
      if (_unmuteBanner) { _unmuteBanner.remove(); _unmuteBanner = null; }
    });
    document.body.appendChild(_unmuteBanner);
  }

  function hideUnmuteBanner() {
    if (_unmuteBanner) { _unmuteBanner.remove(); _unmuteBanner = null; }
  }

  function showTapToPlayHint() {
    var hint = document.createElement('div');
    hint.style.cssText = [
      'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%)',
      'z-index:10020;background:rgba(0,0,0,0.9);color:#fff',
      'font-size:16px;font-weight:700;padding:20px 30px',
      'border-radius:12px;cursor:pointer;text-align:center',
      'touch-action:manipulation;-webkit-tap-highlight-color:transparent'
    ].join(';');
    hint.innerHTML = '\u25B6\uFE0F Tap to play';
    hint.addEventListener('click', function() {
      videoEl.muted = false;
      videoEl.play().catch(function(){});
      hint.remove();
    });
    document.body.appendChild(hint);
    setTimeout(function() { if (hint.parentNode) hint.remove(); }, 5000);
  }

  /* \u2500\u2500 Fullscreen + orientation lock (MIUI/HyperOS aware) \u2500\u2500 */
  function requestFullscreenAndLock(el) {
    var fsPromise = null;
    if (el.requestFullscreen) {
      fsPromise = el.requestFullscreen();
    } else if (el.webkitRequestFullscreen) {
      el.webkitRequestFullscreen();
      fsPromise = Promise.resolve();
    }
    if (fsPromise && typeof fsPromise.then === 'function') {
      fsPromise.then(function() {
        lockLandscape(); // MIUI: lock AFTER fullscreen resolves, not before
      }).catch(function() {
        cssLandscapeFallback(); // fullscreen denied \u2014 CSS rotate instead
      });
    } else if (!fsPromise) {
      cssLandscapeFallback();
    }
  }

  function lockLandscape() {
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(function() {
        showOrientationHint(); // system lock is ON \u2014 still fullscreen, just hint
      });
    } else if (screen.mozLockOrientation) {
      screen.mozLockOrientation('landscape');
    } else if (screen.msLockOrientation) {
      screen.msLockOrientation('landscape');
    }
  }

  // CSS fallback: rotate overlay 90 degrees when native fullscreen is unavailable
  var _cssLandscapeActive = false;
  function cssLandscapeFallback() {
    _cssLandscapeActive = true;
    var w = window.innerWidth;
    var h = window.innerHeight;
    if (w < h) { // portrait \u2014 apply rotation
      overlay.style.cssText = [
        'position:fixed;top:0;left:0;z-index:9999;background:#000',
        'width:' + h + 'px',
        'height:' + w + 'px',
        'transform:rotate(90deg) translateY(-' + w + 'px)',
        'transform-origin:top left',
        'display:flex;flex-direction:column'
      ].join(';');
    }
    showOrientationHint();
  }

  function exitFullscreenAndUnlock() {
    if (_cssLandscapeActive) {
      overlay.style.cssText = '';
      _cssLandscapeActive = false;
      return;
    }
    if (document.exitFullscreen) {
      document.exitFullscreen().catch(function(){});
    } else if (document.webkitExitFullscreen) {
      document.webkitExitFullscreen();
    } else if (document.msExitFullscreen) {
      document.msExitFullscreen();
    }
    if (screen.orientation && screen.orientation.unlock) {
      screen.orientation.unlock();
    } else if (screen.mozUnlockOrientation) {
      screen.mozUnlockOrientation();
    } else if (screen.msUnlockOrientation) {
      screen.msUnlockOrientation();
    }
  }

  // Resize handler: keep CSS-rotated overlay correct if window size changes
  window.addEventListener('resize', function() {
    if (!_cssLandscapeActive) return;
    var w = window.innerWidth;
    var h = window.innerHeight;
    if (w < h) {
      overlay.style.width  = h + 'px';
      overlay.style.height = w + 'px';
      overlay.style.transform = 'rotate(90deg) translateY(-' + w + 'px)';
    } else {
      overlay.style.width = '';
      overlay.style.height = '';
      overlay.style.transform = '';
    }
  });

  /* \u2500\u2500 Gesture controls: brightness (left 30%), volume (right 30%) \u2500\u2500 */
  var _gestureHUD = null;
  var _brightnessVal = 1.0; // track brightness independently

  function setupGestureControls() {
    if (!_brightnessOverlay) {
      _brightnessOverlay = document.createElement('div');
      _brightnessOverlay.id = 'brightness-overlay';
      // Transparent but touchable zone on left 30%
      _brightnessOverlay.style.cssText = 'position:fixed;left:0;top:0;width:30%;height:100%;z-index:9990;background:transparent;display:block;pointer-events:auto;touch-action:none;';
      document.body.appendChild(_brightnessOverlay);
    }
    if (!_volumeOverlay) {
      _volumeOverlay = document.createElement('div');
      _volumeOverlay.id = 'volume-overlay';
      // Transparent but touchable zone on right 30%
      _volumeOverlay.style.cssText = 'position:fixed;right:0;top:0;width:30%;height:100%;z-index:9990;background:transparent;display:block;pointer-events:auto;touch-action:none;';
      document.body.appendChild(_volumeOverlay);
    }
    if (!_gestureHUD) {
      _gestureHUD = document.createElement('div');
      _gestureHUD.id = 'gesture-hud';
      _gestureHUD.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.75);color:#fff;font-size:22px;font-weight:700;padding:16px 28px;border-radius:14px;z-index:10010;display:none;pointer-events:none;text-align:center;min-width:130px;letter-spacing:.02em;';
      document.body.appendChild(_gestureHUD);
    }

    // Re-show zones (hidden during teardown)
    showGestureZones();

    // Only attach listeners once \u2014 teardown removes them, so re-add each time
    _brightnessOverlay.addEventListener('touchstart', onGestureStart, { passive: false });
    _brightnessOverlay.addEventListener('touchmove',  onGestureMove,  { passive: false });
    _brightnessOverlay.addEventListener('touchend',   onGestureEnd,   { passive: false });

    _volumeOverlay.addEventListener('touchstart', onGestureStart, { passive: false });
    _volumeOverlay.addEventListener('touchmove',  onGestureMove,  { passive: false });
    _volumeOverlay.addEventListener('touchend',   onGestureEnd,   { passive: false });

    // Show zone hints briefly on first open
    _brightnessOverlay.style.background = 'rgba(255,220,0,0.08)';
    _volumeOverlay.style.background = 'rgba(80,160,255,0.08)';
    setTimeout(function() {
      if (_brightnessOverlay) _brightnessOverlay.style.background = 'transparent';
      if (_volumeOverlay) _volumeOverlay.style.background = 'transparent';
    }, 1200);
  }

  function teardownGestureControls() {
    if (_brightnessOverlay) {
      _brightnessOverlay.removeEventListener('touchstart', onGestureStart);
      _brightnessOverlay.removeEventListener('touchmove',  onGestureMove);
      _brightnessOverlay.removeEventListener('touchend',   onGestureEnd);
      _brightnessOverlay.style.display = 'none';
      _brightnessOverlay.style.pointerEvents = 'none'; // stop intercepting touches on list
    }
    if (_volumeOverlay) {
      _volumeOverlay.removeEventListener('touchstart', onGestureStart);
      _volumeOverlay.removeEventListener('touchmove',  onGestureMove);
      _volumeOverlay.removeEventListener('touchend',   onGestureEnd);
      _volumeOverlay.style.display = 'none';
      _volumeOverlay.style.pointerEvents = 'none';
    }
    if (_gestureHUD) _gestureHUD.style.display = 'none';
    _gestureActive = null;
  }

  function showGestureZones() {
    if (_brightnessOverlay) {
      _brightnessOverlay.style.display = 'block';
      _brightnessOverlay.style.pointerEvents = 'auto';
    }
    if (_volumeOverlay) {
      _volumeOverlay.style.display = 'block';
      _volumeOverlay.style.pointerEvents = 'auto';
    }
  }

  function onGestureStart(e) {
    var touch = e.touches[0];
    var x = touch.clientX;
    var y = touch.clientY;
    var w = window.innerWidth;
    // Skip gesture in top 70px (topbar zone) — let buttons work
    if (y < 70) return;
    if (x < w * 0.3) {
      _gestureActive = 'brightness';
      _gestureStartY = touch.clientY;
      _gestureStartVal = _brightnessVal; // use tracked value, not filter string
    } else if (x > w * 0.7) {
      _gestureActive = 'volume';
      _gestureStartY = touch.clientY;
      _gestureStartVal = videoEl.volume;
    } else {
      return;
    }
    e.preventDefault();
    e.stopPropagation();
  }

  function onGestureMove(e) {
    if (!_gestureActive) return;
    e.preventDefault();
    e.stopPropagation();
    var touch = e.touches[0];
    // Sensitivity: full screen height swipe = full range
    var screenH = window.innerHeight || 600;
    var deltaY = _gestureStartY - touch.clientY; // up = positive = increase
    if (_gestureActive === 'brightness') {
      // Brightness range: 0.3 to 2.0 (span = 1.7), mapped to screen height
      var bSensitivity = 1.7 / screenH;
      var bNext = Math.max(0.3, Math.min(2.0, _gestureStartVal + deltaY * bSensitivity));
      _brightnessVal = bNext;
      videoEl.style.filter = 'brightness(' + bNext.toFixed(2) + ')';
      var pct = Math.round(((bNext - 0.3) / 1.7) * 100);
      showGestureHUD('\u2600\ufe0f ' + pct + '%');
    } else if (_gestureActive === 'volume') {
      // Volume range: 0 to 1.0, mapped to screen height
      var vSensitivity = 1.0 / screenH;
      var vNext = Math.max(0, Math.min(1, _gestureStartVal + deltaY * vSensitivity));
      videoEl.volume = vNext;
      videoEl.muted = (vNext === 0);
      var icon = vNext === 0 ? '\uD83D\uDD07' : vNext < 0.4 ? '\uD83D\uDD08' : vNext < 0.75 ? '\uD83D\uDD09' : '\uD83D\uDD0A';
      showGestureHUD(icon + ' ' + Math.round(vNext * 100) + '%');
    }
  }

  function onGestureEnd(e) {
    if (!_gestureActive) return;
    e.preventDefault();
    _gestureActive = null;
    // Hide HUD after short delay
    if (_gestureHUD) {
      setTimeout(function() { if (_gestureHUD) _gestureHUD.style.display = 'none'; }, 800);
    }
  }

  function showGestureHUD(text) {
    if (!_gestureHUD) return;
    _gestureHUD.textContent = text;
    _gestureHUD.style.display = 'block';
  }

  /* \u2500\u2500 Play at idx with optional resume time (used by session restore) \u2500\u2500 */
  function playAt(idx, resumeTime) {
    if (!_files[idx]) return;
    // Delegate to main play() for consistency, then seek to resume time after load
    play(idx, false);
    if (resumeTime > 0) {
      videoEl.addEventListener('loadedmetadata', function onMeta() {
        videoEl.removeEventListener('loadedmetadata', onMeta);
        if (resumeTime < videoEl.duration) videoEl.currentTime = resumeTime;
      });
    }
  }

  /* \u2500\u2500 Close player \u2500\u2500 */
  function close() {
    saveState();
    videoEl.pause();
    videoEl.src = '';
    overlay.classList.remove('active');
    document.body.style.overflow = '';

    // Teardown gesture controls
    teardownGestureControls();

    // Hide unmute banner if showing
    hideUnmuteBanner();
    _userMuted = false;

    // Exit fullscreen and unlock orientation (handles both native and CSS fallback)
    exitFullscreenAndUnlock();

    _autoPlayMode = false;

    onVideoClose();
  }

  /* \u2500\u2500 SponsorBlock \u2500\u2500 */
  var _sbSegments    = [];
  var _sbAutoSkip    = true;   // user-toggleable
  var _sbSkipped     = 0;
  var _sbToastTimer  = null;

  // All categories SponsorBlock supports
  var SB_CATS = ['sponsor','selfpromo','interaction','intro','outro','preview','music_offtopic','filler'];
  // Color per category (shown on timeline)
  var SB_CAT_COLORS = {
    sponsor:        '#00d400',
    selfpromo:      '#ffff00',
    interaction:    '#cc00ff',
    intro:          '#00ffff',
    outro:          '#0202ed',
    preview:        '#008fd6',
    music_offtopic: '#ff9900',
    filler:         '#7300ab'
  };
  // Human label per category
  var SB_CAT_LABELS = {
    sponsor:        'Sponsor',
    selfpromo:      'Self-promo',
    interaction:    'Interaction',
    intro:          'Intro',
    outro:          'Outro',
    preview:        'Preview',
    music_offtopic: 'Music (off-topic)',
    filler:         'Filler'
  };

  var SB_API = 'https://sponsor.ajay.app/api/skipSegments';

  // Only extract YouTube IDs from the strict pattern: [xxxxx] or (xxxxx) in filename
  // Avoids false matches on regular song filenames
  function extractVideoId(name) {
    // Must be inside brackets/parens/braces \u2014 never bare in a music filename
    var m = name.match(/[\[\(\{]([a-zA-Z0-9_-]{11})[\]\)\}]/);
    return m ? m[1] : null;
  }

  function fetchSBSegments(videoId) {
    // Request all categories in one call using repeated params
    var catParams = SB_CATS.map(function(c) { return 'category=' + c; }).join('&');
    var url = SB_API + '?videoID=' + encodeURIComponent(videoId) + '&' + catParams + '&actionType=skip';
    return fetch(url)
      .then(function(r) {
        if (r.status === 404) return [];
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .catch(function(e) { return { error: e.message }; });
  }

  function renderSBSegments(duration) {
    var existing = sbTimeline.querySelectorAll('.sb-seg');
    for (var i = existing.length - 1; i >= 0; i--) existing[i].remove();
    if (!_sbSegments.length || !duration || !isFinite(duration) || duration <= 0) return;
    _sbSegments.forEach(function(s) {
      var start = s.segment[0];
      var end   = s.segment[1];
      if (end > duration) end = duration;
      if (start >= duration) return;
      var el = document.createElement('div');
      el.className = 'sb-seg';
      var color = SB_CAT_COLORS[s.category] || '#e8a020';
      el.style.left       = (start / duration * 100) + '%';
      el.style.width      = ((end - start) / duration * 100) + '%';
      el.style.background = color;
      el.title = (SB_CAT_LABELS[s.category] || s.category) + ' (' + fmtDuration(start) + ' \u2192 ' + fmtDuration(end) + ')';
      sbTimeline.appendChild(el);
    });
  }

  function updateSBProgress() {
    if (!videoEl.duration || !isFinite(videoEl.duration)) return;
    sbProgress.style.width = Math.min(videoEl.currentTime / videoEl.duration * 100, 100) + '%';
    // Auto-skip check on every timeupdate (replaces interval)
    if (_sbAutoSkip && _sbSegments.length) checkAndSkip();
  }

  var _sbLastSkipEnd = -1; // guard against re-firing on same segment

  function checkAndSkip() {
    if (!videoEl.duration || !isFinite(videoEl.duration)) return;
    var ct = videoEl.currentTime;
    // Reset guard when user seeks backwards past it
    if (ct < _sbLastSkipEnd - 2) _sbLastSkipEnd = -1;
    _sbSegments.forEach(function(s) {
      var start = s.segment[0];
      var end   = s.segment[1];
      if (ct >= start && ct < end && end !== _sbLastSkipEnd) {
        _sbLastSkipEnd = end;
        videoEl.currentTime = end;
        _sbSkipped++;
        showSkipToast(SB_CAT_LABELS[s.category] || s.category);
        updateSBBar();
      }
    });
  }

  function showSkipToast(label) {
    var t = document.getElementById('sb-skip-toast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'sb-skip-toast';
      t.style.cssText = 'position:fixed;top:72px;right:14px;z-index:10010;background:rgba(0,180,0,0.92);color:#fff;font-size:13px;font-weight:700;padding:8px 16px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;';
      document.body.appendChild(t);
    }
    t.textContent = '\u23ED Skipped: ' + label;
    t.style.opacity = '1';
    if (_sbToastTimer) clearTimeout(_sbToastTimer);
    _sbToastTimer = setTimeout(function() { t.style.opacity = '0'; }, 2000);
  }

  function seekTimeline(e) {
    if (!videoEl.duration || !isFinite(videoEl.duration)) return;
    var rect = sbTimeline.getBoundingClientRect();
    var x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
    var pct = Math.max(0, Math.min(1, x / rect.width));
    videoEl.currentTime = pct * videoEl.duration;
  }

  function updateSBBar() {
    if (!_sbSegments.length) return;
    var cats = {};
    _sbSegments.forEach(function(s) { cats[s.category] = (cats[s.category] || 0) + 1; });
    var parts = Object.keys(cats).map(function(c) {
      var color = SB_CAT_COLORS[c] || '#e8a020';
      return '<span style="color:' + color + '">' + (SB_CAT_LABELS[c] || c) + '</span>';
    });
    var skipInfo = _sbSkipped ? ' \u2014 <strong>' + _sbSkipped + ' skipped</strong>' : '';
    var toggle = '<button id="sb-toggle-btn" onclick="LV.toggleSBSkip()" style="background:' +
      (_sbAutoSkip ? '#00aa44' : '#666') +
      ';color:#fff;border:none;border-radius:10px;padding:2px 10px;font-size:10px;cursor:pointer;font-weight:700;">' +
      (_sbAutoSkip ? 'AUTO-SKIP ON' : 'AUTO-SKIP OFF') + '</button>';
    sbBar.innerHTML = '\u26A1 SponsorBlock: ' + parts.join(', ') + skipInfo + '&nbsp;&nbsp;' + toggle;
  }

  function toggleSBSkip() {
    _sbAutoSkip = !_sbAutoSkip;
    updateSBBar();
  }

  function onVideoOpen(f, onReady) {
    _sbSegments = [];
    _sbSkipped  = 0;
    sbProgress.style.width = '0%';
    renderSBSegments(0);
    sbBar.classList.remove('visible');

    var vid = extractVideoId(f.name);
    if (!vid) {
      // No YouTube ID in filename \u2014 silently skip SponsorBlock, no cluttered message
      if (onReady) onReady();
      return;
    }

    sbBar.innerHTML = '\u26A1 Checking SponsorBlock\u2026';
    sbBar.classList.add('visible');

    fetchSBSegments(vid).then(function(result) {
      if (result && result.error) {
        sbBar.innerHTML = '\u26A1 SponsorBlock unavailable';
        if (onReady) onReady();
        return;
      }
      _sbSegments = result || [];
      if (!_sbSegments.length) {
        sbBar.classList.remove('visible'); // clean: hide bar if nothing to show
        if (onReady) onReady();
        return;
      }
      // Render immediately if duration available, else wait for loadedmetadata
      if (videoEl.duration && isFinite(videoEl.duration)) {
        renderSBSegments(videoEl.duration);
      }
      updateSBBar();
      if (onReady) onReady();
    });
  }

  function onVideoClose() {
    _sbSegments = [];
    _sbSkipped  = 0;
    sbProgress.style.width = '0%';
    renderSBSegments(0);
    sbBar.classList.remove('visible');
    var t = document.getElementById('sb-skip-toast');
    if (t) t.style.opacity = '0';
  }

  /* \u2500\u2500 Timeline seek events \u2500\u2500 */
  sbTimeline.addEventListener('click', seekTimeline);
  sbTimeline.addEventListener('touchstart', function(e) { e.preventDefault(); seekTimeline(e); }, { passive: false });

  /* \u2500\u2500 Utils \u2500\u2500 */
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* \u2500\u2500 Keyboard \u2500\u2500 */
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && overlay.classList.contains('active')) close();
  });

  /* \u2500\u2500 Pull to refresh \u2500\u2500 */
  function ensurePullIndicator() {
    if (_pullIndicator) return _pullIndicator;
    _pullIndicator = document.createElement('div');
    _pullIndicator.id = 'pull-indicator';
    _pullIndicator.style.cssText = [
      'position:fixed;top:0;left:0;right:0;z-index:8000',
      'display:none;align-items:center;justify-content:center',
      'padding:10px 0;font-size:13px;font-weight:700',
      'color:var(--lv-hl);background:var(--surface)',
      'border-bottom:2px solid var(--lv-hl)',
      'transition:opacity .15s',
      'pointer-events:none'
    ].join(';');
    _pullIndicator.textContent = '\u2193 Pull down to refresh';
    document.body.appendChild(_pullIndicator);
    return _pullIndicator;
  }

  grid.addEventListener('touchstart', function(e) {
    // Only start if truly at top of scroll
    if (grid.scrollTop === 0) {
      _pullStartY = e.touches[0].clientY;
      _pullActive = true;
      _pullDelta  = 0;
    }
  }, { passive: true }); // passive OK here \u2014 we only preventDefault in touchmove

  grid.addEventListener('touchmove', function(e) {
    if (!_pullActive) return;
    // If user scrolled down since touchstart, cancel pull
    if (grid.scrollTop > 2) { _pullActive = false; return; }
    var delta = e.touches[0].clientY - _pullStartY;
    if (delta <= 0) return; // pulling up, ignore
    _pullDelta = delta;
    e.preventDefault(); // prevent native scroll/bounce while pulling
    var travel = Math.min(delta * 0.45, _pullThreshold);
    grid.style.transform = 'translateY(' + travel + 'px)';
    var ind = ensurePullIndicator();
    ind.style.display = 'flex';
    if (delta >= _pullThreshold) {
      ind.textContent = '\u2191 Release to refresh';
      ind.style.color = '#fff';
      ind.style.background = 'var(--lv-hl)';
    } else {
      ind.textContent = '\u2193 Pull down to refresh (' + Math.round(delta / _pullThreshold * 100) + '%)';
      ind.style.color = 'var(--lv-hl)';
      ind.style.background = 'var(--surface)';
    }
  }, { passive: false }); // must be non-passive to call preventDefault

  grid.addEventListener('touchend', function() {
    if (!_pullActive) return;
    var triggered = _pullDelta >= _pullThreshold;
    // Animate back
    grid.style.transition = 'transform .2s ease';
    grid.style.transform  = '';
    setTimeout(function() { grid.style.transition = ''; }, 220);
    var ind = ensurePullIndicator();
    if (triggered) {
      ind.textContent = '\u27f3 Refreshing\u2026';
      ind.style.color = '#fff';
      ind.style.background = 'var(--lv-hl)';
      setTimeout(function() { ind.style.display = 'none'; }, 1200);
      refreshFolder();
    } else {
      ind.style.display = 'none';
    }
    _pullActive = false;
    _pullDelta  = 0;
  });

  grid.addEventListener('touchcancel', function() {
    _pullActive = false;
    _pullDelta  = 0;
    grid.style.transform = '';
    if (_pullIndicator) _pullIndicator.style.display = 'none';
  });

  /* \u2500\u2500 Restore previous session \u2500\u2500 */
  var _cachedDirHandle = null;  // live handle when permission granted

  (function initRestore() {
    _rootName = loadRootName();
    updateHeader();

    // STEP 1: Load cached file list instantly — user sees playlist immediately
    loadFileCache().then(function(cached) {
      if (cached && cached.length > 0) {
        // Show cached files (no blob URLs yet — they can't play, but list shows)
        _files = cached.map(function(c, i) {
          return { idx: i, name: c.name, ext: c.ext, size: c.size, url: null, cached: true };
        });
        _filtered = _files.slice();
        renderGrid(_filtered);
        countEl.textContent = cached.length + ' file' + (cached.length !== 1 ? 's' : '') + ' \u2014 tap to play';
      }
    });

    // STEP 2: Try to get live handle for actual playback
    loadHandle().then(function(handle) {
      if (!handle) return;
      _cachedDirHandle = handle;
      handle.queryPermission({ mode: 'read' }).then(function(status) {
        if (status === 'granted') {
          // Live handle ready — re-scan for fresh blob URLs
          restoreHandle(handle);
        } else if (status === 'prompt') {
          // Need user gesture — show restore banner (still have cached list visible)
          showRestoreBanner(handle);
        }
      });
    });
  })();

  function showRestoreBanner(handle) {
    var name = loadRootName() || (handle && handle.name) || 'previous folder';
    var banner = document.createElement('div');
    banner.id = 'restore-banner';
    banner.style.cssText = [
      'position:fixed;bottom:28px;left:50%;transform:translateX(-50%)',
      'z-index:99999;background:var(--lv-hl)',
      'color:#fff;font-weight:700;font-size:15px',
      'padding:14px 28px;border-radius:28px;cursor:pointer',
      'box-shadow:0 4px 24px rgba(0,0,0,0.5)',
      'white-space:nowrap;text-align:center',
      'touch-action:manipulation;-webkit-tap-highlight-color:transparent',
      'max-width:90vw;overflow:hidden;text-overflow:ellipsis'
    ].join(';');
    banner.innerHTML = '\ud83d\udcc2 Tap to reload &nbsp;<strong>' + esc(name) + '</strong>';

    banner.addEventListener('click', function() {
      banner.innerHTML = '\u23f3 Loading\u2026';
      handle.requestPermission({ mode: 'read' }).then(function(newStatus) {
        if (newStatus === 'granted') {
          banner.remove();
          restoreHandle(handle);
        } else {
          banner.innerHTML = '\u26a0\ufe0f Permission denied \u2014 tap Open Folder';
          setTimeout(function() { banner.remove(); }, 3000);
        }
      }).catch(function() { banner.remove(); });
    });

    document.body.appendChild(banner);
  }

  function restoreHandle(handle) {
    _cachedDirHandle = handle;
    _rootName = handle.name;
    storeRootName(_rootName);
    updateHeader();
    scanDir(handle).then(function(files) {
      loadFiles(files);
      // Files now have live blob URLs — remove cached flag
      _files.forEach(function(f) { f.cached = false; });
      sortFiles();
      renderGrid(_filtered);
    });
  }

  /* \u2500\u2500 PWA: Manifest + Install + Service Worker \u2500\u2500 */
  var _pwaDeferredPrompt = null;

  // Generate manifest as Blob URL (reliable for install prompts)
  (function initManifest() {
    var icon512 = '%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 512 512%22%3E%3Crect width=%22512%22 height=%22512%22 rx=%2260%22 fill=%22%230f0f0f%22/%3E%3Cpath d=%22M186 140l220 116-220 116V140z%22 fill=%22%235b8cde%22/%3E%3C/svg%3E';
    var icon192 = '%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 192 192%22%3E%3Crect width=%22192%22 height=%22192%22 rx=%2224%22 fill=%22%230f0f0f%22/%3E%3Cpath d=%22M70 53l82 43-82 43V53z%22 fill=%22%235b8cde%22/%3E%3C/svg%3E';
    var manifest = {
      name: 'Local Player by 37md',
      short_name: 'LocalPlayer',
      description: 'Offline local media player with SponsorBlock',
      start_url: '.',
      display: 'standalone',
      background_color: '#0f0f0f',
      theme_color: '#0f0f0f',
      categories: ['entertainment','video','music'],
      icons: [
        { src: 'data:image/svg+xml,' + icon512, sizes: '512x512', type: 'image/svg+xml', purpose: 'any' },
        { src: 'data:image/svg+xml,' + icon192, sizes: '192x192', type: 'image/svg+xml', purpose: 'any' }
      ]
    };
    var link = document.getElementById('manifest-link');
    if (link) link.href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/json' }));
  })();

  var badgeEl = document.getElementById('pwa-badge');

  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    _pwaDeferredPrompt = e;
    if (badgeEl) badgeEl.style.display = 'block';
  });

  function installPWA() {
    if (!_pwaDeferredPrompt) return;
    _pwaDeferredPrompt.prompt();
    _pwaDeferredPrompt.userChoice.then(function() {
      _pwaDeferredPrompt = null;
      if (badgeEl) badgeEl.style.display = 'none';
    });
  }

  window.addEventListener('appinstalled', function() {
    _pwaDeferredPrompt = null;
    if (badgeEl) badgeEl.style.display = 'none';
  });

  // Service worker: only register if sw.js actually exists (avoids 404 noise)
  if ('serviceWorker' in navigator && location.protocol === 'https:') {
    fetch('sw.js', { method: 'HEAD' }).then(function(r) {
      if (r.ok) navigator.serviceWorker.register('sw.js').catch(function(){});
    }).catch(function(){});
  }

  /* \u2500\u2500 Video events \u2500\u2500 */
  videoEl.addEventListener('timeupdate', function() {
    updateSBProgress(); // also handles auto-skip check
    if (_currentIdx !== null) {
      if (_saveTimer) clearTimeout(_saveTimer);
      _saveTimer = setTimeout(saveState, 5000);
    }
  });
  videoEl.addEventListener('pause', saveState);
  videoEl.addEventListener('ended', function() {
    saveState();
    _autoPlayMode = true;
    playNext();
  });
  videoEl.addEventListener('loadedmetadata', function() {
    renderSBSegments(videoEl.duration);
  });
  videoEl.addEventListener('durationchange', function() {
    renderSBSegments(videoEl.duration);
  });

  /* \u2500\u2500 Public API \u2500\u2500 */
  return { pickFolder: pickFolder, search: search, toggleSort: toggleSort, close: close,
           toggleShuffle: toggleShuffle, toggleSBSkip: toggleSBSkip,
           playNext: playNext, prevTrack: prevTrack, playAll: playAll, installPWA: installPWA,
           playCached: playCached };

})();
</script>
</body>
